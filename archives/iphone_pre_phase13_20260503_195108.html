// ============================================================
// HELPER — elevation wall renderer (with text wrapping + distributor labels)
// ============================================================
function elevWall(title, sub, doors, isHighlighted, shelfData) {
  // ============================================================
  // MERGED ELEVATION DIAGRAM + INVENTORY LIST
  // The SVG diagram shows the wall with shelf bands inside each door
  // (color-coded by status, with shelf numbers — NO product text).
  // The readable inventory list goes BELOW the SVG, per door, per shelf.
  // ============================================================
  
  const totalW = doors.reduce((a,d) => a + d.w, 0);
  const SCALE = Math.max(1.0, Math.min(1100 / totalW, 1.6));
  const wallH = isHighlighted ? 360 : 320; // taller to fit shelf bands legibly
  let xCursor = 30;
  const PAD_TOP = 96;
  const PAD_BOTTOM = 30;
  const svgH = wallH + PAD_TOP + PAD_BOTTOM;
  const svgW = totalW * SCALE + 60;
  
  // Status color map (per shelf band)
  const shelfStatusColors = {
    'keep':   {fill:'rgba(60, 90, 145, 0.85)', stroke:'#4d7ec2'},
    'new':    {fill:'rgba(40, 110, 80, 0.85)', stroke:'#5dcaa5'},
    'expand': {fill:'rgba(140, 105, 40, 0.85)', stroke:'#efb045'},
    'remove': {fill:'rgba(140, 50, 50, 0.85)', stroke:'#cc6666'},
    'empty':  {fill:'rgba(60, 60, 70, 0.55)', stroke:'#555'},
  };
  
  // For each shelf, derive a single dominant status from its tiles
  // (most common status, with 'new'/'remove' winning ties over 'keep')
  function shelfStatus(shelf) {
    const tiles = shelf.tiles || [];
    if (tiles.length === 0) return 'empty';
    const counts = {keep:0, new:0, expand:0, remove:0, empty:0};
    tiles.forEach(t => { counts[t.status || 'keep'] = (counts[t.status || 'keep'] || 0) + 1; });
    // Priority: new > remove > expand > keep (so a mostly-keep shelf with 1 new still highlights)
    const priority = ['new','remove','expand','keep','empty'];
    let best = 'keep', bestCount = -1;
    priority.forEach(s => {
      if (counts[s] > bestCount) { best = s; bestCount = counts[s]; }
    });
    return best;
  }
  
  let elements = '';
  // Floor line + ceiling line
  elements += `<line x1="20" y1="${PAD_TOP + wallH}" x2="${svgW - 20}" y2="${PAD_TOP + wallH}" stroke="#666" stroke-width="2"/>`;
  elements += `<line x1="20" y1="${PAD_TOP}" x2="${svgW - 20}" y2="${PAD_TOP}" stroke="#444" stroke-width="1" stroke-dasharray="4,4"/>`;

  doors.forEach((d, i) => {
    const w = d.w * SCALE;
    const fillMap = {
      'cooler': 'rgba(133,183,235,0.12)',
      'new': 'rgba(93,202,165,0.15)',
      'shelf': 'rgba(239,176,69,0.12)',
      'fixed': 'rgba(108,114,127,0.10)',
    };
    const strokeMap = {
      'cooler': 'var(--blue)',
      'new': 'var(--teal)',
      'shelf': 'var(--amber)',
      'fixed': '#666',
    };
    const fill = fillMap[d.type] || fillMap['cooler'];
    const stroke = strokeMap[d.type] || strokeMap['cooler'];
    const strokeW = d.type === 'new' ? 2.5 : 1.5;

    // Outer door rectangle
    elements += `<rect x="${xCursor}" y="${PAD_TOP}" width="${w}" height="${wallH}" fill="${fill}" stroke="${stroke}" stroke-width="${strokeW}"/>`;

    // Shelf bands inside the door (top \u2192 bottom, SH 5 \u2192 SH 1)
    const shelves = shelfData && shelfData[d.tag] ? shelfData[d.tag] : null;
    if (shelves && shelves.length > 0) {
      const shelfH = (wallH - 4) / shelves.length;
      shelves.forEach((s, idx) => {
        const shY = PAD_TOP + 2 + idx * shelfH;
        const shelfNum = shelves.length - idx;
        const status = shelfStatus(s);
        const sty = shelfStatusColors[status] || shelfStatusColors['keep'];
        // Shelf band fill (inset 4px from door edges)
        elements += `<rect x="${xCursor + 4}" y="${shY + 1}" width="${w - 8}" height="${shelfH - 2}" fill="${sty.fill}" stroke="${sty.stroke}" stroke-width="1" rx="2"/>`;
        // Shelf number on left
        elements += `<text x="${xCursor + 12}" y="${shY + shelfH/2 + 4}" fill="rgba(255,255,255,0.85)" style="font-size:13px;font-weight:700;font-family:monospace;">${shelfNum}</text>`;
      });
    }

    // Vertical divider on right edge (except last)
    if (i < doors.length - 1) {
      elements += `<line x1="${xCursor + w}" y1="${PAD_TOP - 8}" x2="${xCursor + w}" y2="${PAD_TOP + wallH + 8}" stroke="#fff" stroke-width="1.5" opacity="0.4"/>`;
    }

    const cx = xCursor + w / 2;

    // Distributor pill at top
    if (d.dist) {
      const distY = PAD_TOP - 70;
      const distW = Math.min(d.dist.length * 6.5 + 14, w - 4);
      elements += `<rect x="${cx - distW/2}" y="${distY - 11}" width="${distW}" height="15" fill="rgba(139,158,255,0.15)" stroke="rgba(139,158,255,0.5)" stroke-width="0.5" rx="3"/>`;
      elements += `<text x="${cx}" y="${distY}" text-anchor="middle" fill="#a4b3ff" style="font-size:9px;font-family:monospace;letter-spacing:0.5px;">${d.dist}</text>`;
    }

    // Tag label
    const tagY = PAD_TOP - 38;
    elements += `<line x1="${cx}" y1="${tagY + 8}" x2="${cx}" y2="${PAD_TOP - 2}" stroke="${stroke}" stroke-width="1"/>`;
    elements += `<text x="${cx}" y="${tagY}" text-anchor="middle" fill="${d.type === 'new' ? '#5dcaa5' : '#e8ebef'}" style="font-size:14px;font-family:monospace;font-weight:600;">${d.tag}</text>`;
    
    if (d.type === 'new') {
      elements += `<text x="${cx}" y="${tagY - 16}" text-anchor="middle" fill="#5dcaa5" style="font-size:9px;font-weight:600;letter-spacing:1px;">[NEW]</text>`;
    }
    
    // Category name BELOW the tag (above the door box)
    elements += `<text x="${cx}" y="${PAD_TOP - 14}" text-anchor="middle" fill="#cbd5e0" style="font-size:11px;font-weight:600;">${d.name}</text>`;

    xCursor += w;
  });

  // ============================================================
  // INVENTORY LIST (below the SVG) \u2014 readable text per door per shelf
  // ============================================================
  let inventorySection = '';
  if (shelfData) {
    const tagColorMap = {
      'cooler': '#85B7EB',
      'new': '#5dcaa5',
      'shelf': '#efb045',
      'fixed': '#999',
    };
    const statusBadge = {
      'keep': '<span style="display:inline-block;width:8px;height:8px;background:#4d7ec2;border-radius:50%;margin-right:5px;vertical-align:middle;"></span>',
      'new': '<span style="display:inline-block;width:8px;height:8px;background:#5dcaa5;border-radius:50%;margin-right:5px;vertical-align:middle;"></span>',
      'expand': '<span style="display:inline-block;width:8px;height:8px;background:#efb045;border-radius:50%;margin-right:5px;vertical-align:middle;"></span>',
      'remove': '<span style="display:inline-block;width:8px;height:8px;background:#cc6666;border-radius:50%;margin-right:5px;vertical-align:middle;"></span>',
    };
    
    const doorBlocks = doors.filter(d => shelfData[d.tag]).map(d => {
      const accent = tagColorMap[d.type] || tagColorMap['cooler'];
      const tagColor = d.type === 'new' ? '#5dcaa5' : '#fff';
      const newBadge = d.type === 'new' ? '<span style="margin-left:8px;color:#5dcaa5;font-size:10px;font-weight:600;letter-spacing:1px;">[NEW]</span>' : '';
      const shelves = shelfData[d.tag];
      const allTiles = shelves.flatMap(s => s.tiles || []);
      const totalCost = allTiles.reduce((s, t) => s + (parseFloat(t.cost) || 0) * (t.facings || 1), 0);
      const totalSKUs = allTiles.length;
      const totalFacings = allTiles.reduce((s, t) => s + (t.facings || 1), 0);
      const removed = allTiles.filter(t => t.status === 'remove').length;
      const newCount = allTiles.filter(t => t.status === 'new').length;
      
      // Per-shelf rows
      const shelfRows = shelves.map((s, idx) => {
        const shelfNum = shelves.length - idx;
        const tier = s.tier ? s.tier.toUpperCase() : '';
        const tiles = s.tiles || [];
        const shelfTotal = tiles.reduce((sum, t) => sum + (parseFloat(t.cost) || 0) * (t.facings || 1), 0);
        
        // Just product names (no prices, no facings, no SKU columns)
        const skuRows = tiles.map(t => {
          const badge = statusBadge[t.status || 'keep'];
          return `
            <div style="padding:3px 8px;font-size:11.5px;line-height:1.4;border-bottom:1px dotted rgba(255,255,255,0.05);">
              ${badge}<strong style="color:#fff;">${t.name}</strong>${t.format ? `<span style="color:var(--muted);"> \u00b7 ${t.format}</span>` : ''}
            </div>`;
        }).join('');
        
        return `
          <div style="margin-bottom:10px;">
            <div style="padding:4px 8px;background:rgba(255,255,255,0.04);border-left:3px solid ${accent};border-radius:2px;margin-bottom:2px;">
              <span style="font-family:monospace;font-size:12px;font-weight:700;color:${accent};">SH ${shelfNum}</span>
            </div>
            ${skuRows}
          </div>`;
      }).join('');
      
      return `
        <div style="background:rgba(20,28,42,0.5);border:1.5px solid ${accent};border-radius:6px;padding:14px 16px;margin-bottom:14px;">
          <!-- Door header -->
          <div style="display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid rgba(255,255,255,0.12);padding-bottom:10px;margin-bottom:12px;">
            <div>
              <div style="display:flex;align-items:baseline;gap:10px;">
                <span style="font-family:monospace;font-size:18px;font-weight:700;color:${tagColor};letter-spacing:1px;">${d.tag}</span>
                <span style="font-size:14px;font-weight:600;color:#fff;">${d.name}</span>
                ${newBadge}
              </div>
              <div style="font-size:11px;color:var(--muted);margin-top:3px;">${d.sub || ''}</div>
            </div>
            <div style="text-align:right;">
              <div style="font-size:10px;color:var(--muted);font-family:monospace;letter-spacing:0.5px;">${d.dist || ''}</div>
            </div>
          </div>
          ${shelfRows}
        </div>`;
    }).join('');
    
    inventorySection = `
      <div style="margin-top:24px;">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;border-bottom:2px solid rgba(255,255,255,0.12);padding-bottom:8px;">
          <h3 style="font-size:14px;color:#fff;letter-spacing:1px;text-transform:uppercase;">Product List \u2014 Shelf by Shelf</h3>
          <div style="font-size:10.5px;color:var(--muted);font-family:monospace;letter-spacing:0.5px;">SH 5 = top shelf \u00b7 SH 1 = kick-plate</div>
        </div>
        ${doorBlocks}
      </div>`;
  }

  return `
    <h2 class="slide-title">${title}</h2>
    <p class="slide-subtitle">${sub}</p>
    <div class="floor-plan" style="overflow-x:auto;">
      <svg viewBox="0 0 ${svgW} ${svgH}" width="100%" style="min-width:${svgW}px;">
        ${elements}
      </svg>
      <div style="display:flex;gap:14px;margin-top:14px;font-size:11.5px;flex-wrap:wrap;">
        <div style="display:flex;align-items:center;gap:6px;"><div style="width:14px;height:14px;background:rgba(60,90,145,0.85);border:1px solid #4d7ec2;border-radius:2px;"></div>Shelf: KEEP / curate</div>
        <div style="display:flex;align-items:center;gap:6px;"><div style="width:14px;height:14px;background:rgba(40,110,80,0.85);border:1px solid #5dcaa5;border-radius:2px;"></div>Shelf: NEW category</div>
        <div style="display:flex;align-items:center;gap:6px;"><div style="width:14px;height:14px;background:rgba(140,105,40,0.85);border:1px solid #efb045;border-radius:2px;"></div>Shelf: EXPAND</div>
        <div style="display:flex;align-items:center;gap:6px;"><div style="width:14px;height:14px;background:rgba(140,50,50,0.85);border:1px solid #cc6666;border-radius:2px;"></div>Shelf: REMOVE</div>
        <div style="display:flex;align-items:center;gap:6px;"><div style="width:14px;height:14px;background:rgba(139,158,255,0.2);border:1px solid rgba(139,158,255,0.5);border-radius:3px;"></div>Distributor (top label)</div>
      </div>
      ${inventorySection}
    </div>`;
}

// ============================================================
// HELPER — liquor wall renderer (BC-1, FC-1)
// ============================================================
function drawLiquorWall(title, subtitle, shelves, fixtureType) {
  // Calculate totals
  let existingTotal = 0;
  let newTotal = 0;
  let totalSKUs = 0;
  shelves.forEach(s => {
    s.skus.forEach(sku => {
      totalSKUs++;
      // Estimate $ value: qty × est unit cost (avg $25 for 750ml, $1.10 for minis, $30 for 1.75L)
      let unitCost = 25;
      if (sku.size === '50ml') unitCost = 1.10;
      else if (sku.size === '1.75L') unitCost = 30;
      else if (sku.size === '375ml') unitCost = 18;
      const lineVal = sku.qty * unitCost;
      if (sku.status === 'NEW') newTotal += lineVal;
      else if (sku.status === 'EXPAND') { existingTotal += lineVal * 0.6; newTotal += lineVal * 0.4; }
      else existingTotal += lineVal;
    });
  });

  const statusColor = (s) => {
    if (s === 'NEW') return 'var(--teal)';
    if (s === 'EXPAND') return 'var(--amber)';
    return 'var(--muted)';
  };
  const statusBg = (s) => {
    if (s === 'NEW') return 'rgba(93,202,165,0.12)';
    if (s === 'EXPAND') return 'rgba(239,176,69,0.10)';
    return 'rgba(108,114,127,0.06)';
  };

  return `
    <h2 class="slide-title">${title}</h2>
    <p class="slide-subtitle">${subtitle}</p>

    <div class="stat-grid" style="margin-bottom:18px;grid-template-columns:repeat(4,1fr);">
      <div class="stat" style="border-left:3px solid var(--muted);">
        <div class="label">SKUs across fixture</div>
        <div class="val">${totalSKUs}</div>
      </div>
      <div class="stat" style="border-left:3px solid var(--blue);">
        <div class="label">EXISTING (KEEP)</div>
        <div class="val">$${Math.round(existingTotal).toLocaleString()}</div>
        <div class="delta" style="color:var(--muted);">Already in store</div>
      </div>
      <div class="stat" style="border-left:3px solid var(--teal);">
        <div class="label">NEW + EXPAND</div>
        <div class="val">$${Math.round(newTotal).toLocaleString()}</div>
        <div class="delta up">First fill-in order</div>
      </div>
      <div class="stat" style="border-left:3px solid #efb045;">
        <div class="label">FIXTURE TOTAL</div>
        <div class="val">$${Math.round(existingTotal + newTotal).toLocaleString()}</div>
        <div class="delta">Inventory at this zone</div>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:14px;">
      ${shelves.map((shelf, i) => `
        <div class="card" style="padding:14px 16px;border-left:3px solid var(--accent);">
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px;">
            <div>
              <div style="font-family:monospace;font-size:11px;color:var(--muted);letter-spacing:1px;">SHELF ${i+1}</div>
              <h3 style="margin:2px 0;font-size:15px;">${shelf.label}</h3>
            </div>
            <span onclick="window.goToSlide('distributors')" style="cursor:pointer;font-family:monospace;font-size:10.5px;background:rgba(139,158,255,0.15);color:#a4b3ff;padding:4px 10px;border-radius:3px;border:1px solid rgba(139,158,255,0.3);">${shelf.dist}</span>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:6px;">
            ${shelf.skus.map(sku => `
              <div style="background:${statusBg(sku.status)};border:1px solid ${statusColor(sku.status)};border-radius:3px;padding:5px 9px;font-size:11.5px;display:flex;align-items:center;gap:6px;">
                <span style="font-weight:500;">${sku.name}</span>
                <span style="font-family:monospace;color:var(--muted);font-size:10.5px;">${sku.size} × ${sku.qty}</span>
                <span style="font-family:monospace;font-size:9px;color:${statusColor(sku.status)};letter-spacing:0.5px;font-weight:600;">${sku.status}</span>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('')}
    </div>

    <div class="card" style="margin-top:18px;border-left:3px solid #efb045;padding:12px 16px;">
      <p style="font-size:12.5px;"><strong style="color:#efb045;">Inventory status legend:</strong> <span style="color:var(--muted);">CURRENT</span> = already on shelves, transfers with business · <span style="color:var(--amber);">EXPAND</span> = increasing facings/depth (60% existing, 40% new order) · <span style="color:var(--teal);">NEW</span> = adding to assortment (full new order). Click any distributor pill to jump to the Distributors slide.</p>
    </div>`;
}

// ============================================================
// NAV + SLIDE STATE
// ============================================================
let currentSlide = 0;

function renderNav() {
  const nav = document.getElementById('nav');
  const sections = {};
  slides.forEach((s, i) => {
    if (!sections[s.section]) sections[s.section] = [];
    sections[s.section].push({ ...s, idx: i });
  });

  let html = '';
  for (const sec of Object.keys(sections)) {
    html += `<div class="nav-section"><div class="nav-section-label">${sec}</div>`;
    sections[sec].forEach(s => {
      html += `<div class="nav-item" data-idx="${s.idx}">
        <span class="num">${String(s.idx + 1).padStart(2,'0')}</span>
        <span>${s.label}</span>
      </div>`;
    });
    html += '</div>';
  }
  nav.innerHTML = html;
  nav.querySelectorAll('.nav-item').forEach(el => {
    el.addEventListener('click', () => goTo(parseInt(el.dataset.idx)));
  });
}

function renderSlides() {
  const c = document.getElementById('slide-container');
  // Slide types that get a "View in Inventory & Cost" cross-link pill at the top
  const showInvLink = (type) => {
    return type.startsWith('elev-') ||
           type === 'coolers' || type === 'freezers' || type === 'shelves' ||
           type.startsWith('gondolas-') ||
           type.startsWith('pkt-');
  };
  const invLinkPill = `<div style="margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap;">
    <span onclick="window.goToSlide('inventory')" style="cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-size:11px;color:#a4b3ff;background:rgba(139,158,255,0.10);border:1px solid rgba(139,158,255,0.35);padding:5px 11px;border-radius:14px;font-family:monospace;letter-spacing:0.5px;transition:background 0.15s;" onmouseover="this.style.background='rgba(139,158,255,0.20)'" onmouseout="this.style.background='rgba(139,158,255,0.10)'">&larr; Back to Inventory &amp; Cost</span>
    <span onclick="window.goToSlide('floorplan')" style="cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-size:11px;color:#5dcaa5;background:rgba(93,202,165,0.10);border:1px solid rgba(93,202,165,0.35);padding:5px 11px;border-radius:14px;font-family:monospace;letter-spacing:0.5px;transition:background 0.15s;" onmouseover="this.style.background='rgba(93,202,165,0.20)'" onmouseout="this.style.background='rgba(93,202,165,0.10)'">&larr; Back to Floor Plan</span>
  </div>`;
  c.innerHTML = slides.map((s, i) => {
    const body = renderers[s.type]();
    const linkBar = showInvLink(s.type) ? invLinkPill : '';
    return `<div class="slide" data-idx="${i}">${linkBar}${body}</div>`;
  }).join('');
  document.getElementById('total').textContent = slides.length;
}

function goTo(idx) {
  if (idx < 0 || idx >= slides.length) return;
  currentSlide = idx;
  document.querySelectorAll('.slide').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  document.querySelectorAll('.nav-item').forEach((el, i) => {
    el.classList.toggle('active', parseInt(el.dataset.idx) === idx);
  });
  document.getElementById('cur').textContent = idx + 1;
  document.getElementById('prev-btn').disabled = idx === 0;
  document.getElementById('next-btn').disabled = idx === slides.length - 1;
  document.getElementById('slide-container').scrollTop = 0;
}

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') {
    e.preventDefault(); goTo(currentSlide + 1);
  } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
    e.preventDefault(); goTo(currentSlide - 1);
  } else if (e.key === 'Home') {
    e.preventDefault(); goTo(0);
  } else if (e.key === 'End') {
    e.preventDefault(); goTo(slides.length - 1);
  }
});

// Buttons
document.getElementById('prev-btn').addEventListener('click', () => goTo(currentSlide - 1));
document.getElementById('next-btn').addEventListener('click', () => goTo(currentSlide + 1));

// Expose goTo globally for inline onclick handlers from rendered HTML

// ============================================================
// MOBILE — sidebar drawer toggle + auto-close on nav tap
// ============================================================
window.toggleMobileMenu = function() {
  var sb = document.getElementById('sidebar');
  var ov = document.getElementById('mobile-overlay');
  var body = document.body;
  if (!sb || !ov) { console.warn('Sidebar/overlay missing'); return; }
  var isMobile = window.matchMedia('(max-width: 768px)').matches;
  if (isMobile) {
    // Mobile: slide-in overlay drawer
    var isOpen = sb.classList.toggle('open');
    ov.classList.toggle('open', isOpen);
  } else {
    // Desktop: shrink the sidebar to width 0 (flex flow), let main expand
    body.classList.toggle('sidebar-collapsed');
    try { localStorage.setItem('sidebarCollapsed', body.classList.contains('sidebar-collapsed') ? '1' : '0'); } catch (e) {}
  }
};

// Restore desktop sidebar collapsed state on load
(function restoreSidebarState() {
  try {
    if (localStorage.getItem('sidebarCollapsed') === '1' && !window.matchMedia('(max-width: 768px)').matches) {
      document.body.classList.add('sidebar-collapsed');
    }
  } catch (e) {}
})();
document.addEventListener('click', function(e) {
  if (!e.target || !e.target.closest) return;
  var navItem = e.target.closest('#sidebar .nav-item');
  if (navItem && window.matchMedia('(max-width: 768px)').matches) {
    var sb = document.getElementById('sidebar');
    var ov = document.getElementById('mobile-overlay');
    if (sb) sb.classList.remove('open');
    if (ov) ov.classList.remove('open');
  }
});
window.goToSlide = function(slideId) {
  const idx = slides.findIndex(s => s.id === slideId);
  if (idx >= 0) goTo(idx);
};

// ============================================================
// RANKER TOGGLE — switches SKU ranker between velocity/volume/price
// Wired to button[onclick="rankerToggle(this)"] inside distributor cards.
// ============================================================
window.rankerToggle = function(btn) {
  const id = btn.getAttribute('data-ranker');
  const mode = btn.getAttribute('data-mode');
  if (!id || !mode) return;
  
  // Reset all buttons in this ranker group to muted state
  document.querySelectorAll('button[data-ranker="' + id + '"]').forEach(function(b) {
    b.style.background = 'rgba(255,255,255,0.04)';
    b.style.border = '1px solid rgba(255,255,255,0.10)';
    b.style.color = 'var(--muted)';
  });
  
  // Highlight the clicked button with mode-specific color
  if (mode === 'velocity') {
    btn.style.background = 'rgba(93,202,165,0.15)';
    btn.style.border = '1px solid rgba(93,202,165,0.4)';
    btn.style.color = '#5dcaa5';
  } else if (mode === 'volume') {
    btn.style.background = 'rgba(239,176,69,0.15)';
    btn.style.border = '1px solid rgba(239,176,69,0.4)';
    btn.style.color = '#efb045';
  } else if (mode === 'price') {
    btn.style.background = 'rgba(133,183,235,0.15)';
    btn.style.border = '1px solid rgba(133,183,235,0.4)';
    btn.style.color = '#85B7EB';
  }
  
  // Show only the matching list, hide the others
  const container = document.getElementById(id);
  if (!container) return;
  container.querySelectorAll('[data-list]').forEach(function(el) {
    el.style.display = el.getAttribute('data-list') === mode ? 'block' : 'none';
  });
};

// ============================================================
// FLOOR PLAN HOVER TOOLTIP
// Wires hover-to-zoom tooltip on every fixture rect across both
// BEFORE and AFTER plans. Uses event delegation on the slide
// container so it survives slide changes.
// ============================================================
(function setupFloorplanTooltip() {
  // Wait for DOM ready (we're inline at end of body so it should be ready)
  function init() {
    const container = document.getElementById('slide-container');
    if (!container) { setTimeout(init, 50); return; }
    
    // The tooltip <div> is rendered inside the floorplan slide.
    // Use event delegation to catch hovers on any rect in the floorplan SVGs.
    
    // Build tooltip content from a rect's siblings
    function buildTooltipFromRect(rect) {
      const svg = rect.closest('svg');
      if (!svg) return null;
      const parent = rect.parentNode;
      let textNodes = [];
      
      if (parent && parent.tagName === 'g') {
        textNodes = Array.from(parent.querySelectorAll('text'));
      } else {
        // Spatially-near text elements (for the BEFORE plan where rects sit directly in <svg>)
        const rx = parseFloat(rect.getAttribute('x'));
        const ry = parseFloat(rect.getAttribute('y'));
        const rw = parseFloat(rect.getAttribute('width'));
        const rh = parseFloat(rect.getAttribute('height'));
        if (isNaN(rx)) return null;
        textNodes = Array.from(svg.querySelectorAll('text')).filter(t => {
          const tx = parseFloat(t.getAttribute('x') || 0);
          const ty = parseFloat(t.getAttribute('y') || 0);
          // Pad bounds slightly to capture labels just outside the rect
          return tx >= rx - 8 && tx <= rx + rw + 8 && ty >= ry - 4 && ty <= ry + rh + 14;
        });
      }
      
      if (textNodes.length === 0) return null;
      
      const lines = textNodes.map(t => {
        const txt = (t.textContent || '').trim();
        if (!txt) return null;
        const styleStr = t.getAttribute('style') || '';
        const sizeMatch = styleStr.match(/font-size:\s*([\d.]+)px/);
        const size = sizeMatch ? parseFloat(sizeMatch[1]) : 10;
        const fill = t.getAttribute('fill') || '#fff';
        const isMonospace = styleStr.includes('monospace');
        const isBold = /font-weight:\s*[67]00/.test(styleStr);
        return { txt, size, fill, isMonospace, isBold };
      }).filter(Boolean);
      
      if (lines.length === 0) return null;
      
      return lines.map(l => {
        const scaledSize = Math.max(12, Math.min(22, l.size * 2.0));
        const weight = l.isBold ? '700' : '500';
        const family = l.isMonospace ? "'SF Mono', Consolas, monospace" : 'inherit';
        return '<div style="font-size:' + scaledSize + 'px;color:' + l.fill + ';font-weight:' + weight + ';font-family:' + family + ';line-height:1.35;margin:2px 0;">' + l.txt + '</div>';
      }).join('');
    }
    
    // Filter: is this a fixture rect (not the store outline path or a structural rect)?
    function isFixtureRect(el) {
      if (!el || el.tagName !== 'rect') return false;
      // Must be inside a floor-plan container
      const fp = el.closest('.floor-plan-wrapper');
      if (!fp) return false;
      // Must have x and stroke (zone rectangles do, structural decorations may not)
      return el.hasAttribute('x') && el.hasAttribute('stroke');
    }
    
    function getTooltip() {
      // The tooltip lives inside the active floorplan slide
      return document.querySelector('.slide.active #zone-tooltip');
    }
    
    // Mouseover (delegated)
    container.addEventListener('mouseover', (e) => {
      const rect = e.target;
      if (!isFixtureRect(rect)) return;
      const tt = getTooltip();
      if (!tt) return;
      const html = buildTooltipFromRect(rect);
      if (!html) return;
      tt.innerHTML = html;
      tt.style.opacity = '1';
      // Brighten the hovered rect
      const cur = rect.getAttribute('fill') || '';
      if (cur && !rect.dataset.origFill) {
        rect.dataset.origFill = cur;
        const brighter = cur.replace(/0\.[0-9]+/g, (m) => Math.min(parseFloat(m) + 0.30, 0.85).toString());
        rect.setAttribute('fill', brighter);
      }
      // Stroke pulse
      if (!rect.dataset.origStrokeWidth) {
        rect.dataset.origStrokeWidth = rect.getAttribute('stroke-width') || '1';
        rect.setAttribute('stroke-width', String(parseFloat(rect.dataset.origStrokeWidth) + 1));
      }
    }, true);
    
    container.addEventListener('mousemove', (e) => {
      const rect = e.target;
      if (!isFixtureRect(rect)) return;
      const tt = getTooltip();
      if (!tt || tt.style.opacity !== '1') return;
      const ttRect = tt.getBoundingClientRect();
      let x = e.clientX + 18;
      let y = e.clientY + 18;
      if (x + ttRect.width > window.innerWidth - 10) x = e.clientX - ttRect.width - 18;
      if (y + ttRect.height > window.innerHeight - 10) y = e.clientY - ttRect.height - 18;
      tt.style.left = x + 'px';
      tt.style.top = y + 'px';
    }, true);
    
    container.addEventListener('mouseout', (e) => {
      const rect = e.target;
      if (!isFixtureRect(rect)) return;
      const tt = getTooltip();
      if (tt) tt.style.opacity = '0';
      // Restore original fill + stroke
      if (rect.dataset.origFill) {
        rect.setAttribute('fill', rect.dataset.origFill);
        delete rect.dataset.origFill;
      }
      if (rect.dataset.origStrokeWidth) {
        rect.setAttribute('stroke-width', rect.dataset.origStrokeWidth);
        delete rect.dataset.origStrokeWidth;
      }
    }, true);
    
    // Add cursor:pointer styling globally to fixture rects
    const styleEl = document.createElement('style');
    styleEl.textContent = '.floor-plan-wrapper rect[x][stroke] { cursor: pointer; transition: stroke-width 0.15s; }';
    document.head.appendChild(styleEl);
  }
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();


// PRELOAD door registry — call wall renderers once so their side-effect
// (registerDoorWallData) populates DOOR_REGISTRY. Without this, the
// individual D1..D22 slides show "door data not loaded".
['elev-lower-left', 'elev-top', 'elev-upper-left', 'elev-right', 'elev-freezers'].forEach(function(t) {
  try { if (typeof renderers !== 'undefined' && renderers[t]) renderers[t](); }
  catch (e) { console.warn('Preload ' + t + ':', e); }
});

// Init
renderNav();
renderSlides();
goTo(0);
</script>


<!-- ============================================================ -->
<!-- FLOOR PLAN EDITOR — drag fixtures to reposition zones        -->
<!-- Persists per-fixture {dx,dy} offsets to localStorage         -->
<!-- ============================================================ -->
<script>
(function setupFloorplanEditor() {
  var STORAGE_KEY = 'floorplan-positions-v1';
  var editMode = false;
  var dragState = null;

  function getPositions() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
    catch (e) { return {}; }
  }
  function setPositions(p) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); } catch (e) {}
  }

  // Convert screen coords to SVG user-space coords, accounting for viewBox + scaling
  function getSvgPoint(svg, evt) {
    var pt = svg.createSVGPoint();
    var t = (evt.touches && evt.touches[0]) || evt;
    pt.x = t.clientX; pt.y = t.clientY;
    var ctm = svg.getScreenCTM();
    return ctm ? pt.matrixTransform(ctm.inverse()) : { x: pt.x, y: pt.y };
  }

  // Walk all SVGs in the active slide and tag each fixture <g> with data-fp-tag,
  // then apply any saved transform.
  function tagAndApply() {
    var positions = getPositions();
    document.querySelectorAll('#slide-container svg g').forEach(function(g) {
      // Must contain at least one <rect> to be a fixture
      var rect = g.querySelector('rect');
      if (!rect) return;
      // Skip if no usable label
      var tag = g.getAttribute('data-fp-tag');
      if (!tag) {
        // Try first <text> child
        var t = g.querySelector('text');
        if (t && t.textContent.trim()) {
          tag = t.textContent.trim();
        } else {
          // Try onclick attribute
          var oc = g.getAttribute('onclick') || '';
          var m = oc.match(/goToSlide\(['"]([^'"]+)['"]\)/);
          if (m) tag = m[1];
        }
        if (tag) g.setAttribute('data-fp-tag', tag);
      }
      if (!tag) return;
      // Apply any saved offset
      var pos = positions[tag];
      if (pos && (pos.dx || pos.dy)) {
        g.setAttribute('transform', 'translate(' + pos.dx + ',' + pos.dy + ')');
      }
    });
  }

  function startDrag(e) {
    if (!editMode) return;
    var g = e.target.closest && e.target.closest('g[data-fp-tag]');
    if (!g) return;
    var svg = g.closest('svg');
    if (!svg) return;
    e.preventDefault(); e.stopPropagation();
    var startPt = getSvgPoint(svg, e);
    var tag = g.getAttribute('data-fp-tag');
    var positions = getPositions();
    var startOff = positions[tag] || { dx: 0, dy: 0 };
    dragState = { g: g, svg: svg, startPt: startPt, startOff: startOff, tag: tag, lastOff: startOff };
    g.style.opacity = '0.65';
    g.style.outline = '2px dashed #5dcaa5';
  }

  function moveDrag(e) {
    if (!dragState) return;
    e.preventDefault();
    var pt = getSvgPoint(dragState.svg, e);
    var dx = dragState.startOff.dx + (pt.x - dragState.startPt.x);
    var dy = dragState.startOff.dy + (pt.y - dragState.startPt.y);
    dragState.lastOff = { dx: Math.round(dx), dy: Math.round(dy) };
    dragState.g.setAttribute('transform', 'translate(' + dragState.lastOff.dx + ',' + dragState.lastOff.dy + ')');
  }

  function endDrag(e) {
    if (!dragState) return;
    dragState.g.style.opacity = '';
    dragState.g.style.outline = '';
    var positions = getPositions();
    positions[dragState.tag] = dragState.lastOff;
    setPositions(positions);
    var indicator = document.getElementById('fp-saved-indicator');
    if (indicator) {
      indicator.style.opacity = '1';
      setTimeout(function() { indicator.style.opacity = '0'; }, 900);
    }
    dragState = null;
  }

  function toggleEditMode() {
    editMode = !editMode;
    document.querySelectorAll('#slide-container svg').forEach(function(svg) {
      svg.style.cursor = editMode ? 'move' : '';
      // Disable click navigation while editing — click handlers stay on <g>, but startDrag stopPropagation kills them
      svg.classList.toggle('fp-editing', editMode);
    });
    var btn = document.getElementById('fp-edit-btn');
    if (btn) {
      btn.textContent = editMode ? '🔒 Lock layout' : '✏️ Edit layout';
      btn.style.background = editMode ? '#5dcaa5' : 'var(--panel-2)';
      btn.style.color = editMode ? '#0f1419' : 'var(--text)';
    }
    var hint = document.getElementById('fp-edit-hint');
    if (hint) hint.style.display = editMode ? 'inline-flex' : 'none';
  }

  function resetPositions() {
    if (!confirm('Reset all fixture positions to the original architect layout?')) return;
    setPositions({});
    document.querySelectorAll('g[data-fp-tag]').forEach(function(g) {
      g.removeAttribute('transform');
    });
  }

  function exportPositions() {
    var json = JSON.stringify(getPositions(), null, 2);
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(json);
      alert('Layout exported to clipboard:\n\n' + json);
    } else {
      prompt('Copy this JSON layout:', json);
    }
  }

  function injectToolbar() {
    var slide = document.querySelector('.slide.active');
    if (!slide) return;
    var fp = slide.querySelector('.floor-plan');
    if (!fp) return;
    if (slide.querySelector('#fp-toolbar')) return;
    var toolbar = document.createElement('div');
    toolbar.id = 'fp-toolbar';
    toolbar.style.cssText = 'display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center;';
    var btnCss = 'padding:8px 14px;font-size:12px;font-family:inherit;border-radius:6px;cursor:pointer;border:1px solid var(--border);background:var(--panel-2);color:var(--text);font-weight:600;letter-spacing:0.3px;transition:all 0.15s;';
    toolbar.innerHTML =
      '<button id="fp-edit-btn" onclick="window.fpToggleEdit()" style="' + btnCss + '">✏️ Edit layout</button>' +
      '<button onclick="window.fpReset()" style="' + btnCss + '">↺ Reset to architect</button>' +
      '<button onclick="window.fpExport()" style="' + btnCss + '">📋 Export JSON</button>' +
      '<span id="fp-edit-hint" style="display:none;align-items:center;font-size:11px;color:var(--accent);font-style:italic;margin-left:6px;">Drag any fixture to reposition · changes auto-save</span>' +
      '<span id="fp-saved-indicator" style="opacity:0;transition:opacity 0.3s;font-size:11px;color:#5dcaa5;font-family:monospace;letter-spacing:1px;margin-left:auto;">✓ SAVED</span>';
    fp.parentNode.insertBefore(toolbar, fp);
  }

  function init() {
    var container = document.getElementById('slide-container');
    if (!container) { setTimeout(init, 100); return; }
    // Re-tag + re-inject toolbar whenever slide content changes
    var observer = new MutationObserver(function() {
      setTimeout(function() { tagAndApply(); injectToolbar(); }, 50);
    });
    observer.observe(container, { childList: true, subtree: true });
    // Initial pass
    tagAndApply();
    injectToolbar();
    // Drag handlers — capture phase so we can suppress click navigation
    document.addEventListener('mousedown', startDrag, true);
    document.addEventListener('mousemove', moveDrag, true);
    document.addEventListener('mouseup', endDrag, true);
    document.addEventListener('touchstart', startDrag, { passive: false, capture: true });
    document.addEventListener('touchmove', moveDrag, { passive: false, capture: true });
    document.addEventListener('touchend', endDrag, true);
    // Globals for toolbar buttons
    window.fpToggleEdit = toggleEditMode;
    window.fpReset = resetPositions;
    window.fpExport = exportPositions;
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
