// ============================================================
// SKU CATEGORIZATION
// Distributor portals (CBS Direct, Breakthru iSell, KeHE Connect,
// Eby-Brown order app, etc.) all categorize their portfolio by
// segment — Beer, Wine, Spirits, RTD, Seltzer, etc. This function
// derives the category for any SKU based on zone + product name.
// ============================================================
function deriveSkuCategory(s) {
  const name = (s.sku || '').toLowerCase();
  const size = (s.size || '').toLowerCase();
  const zone = s.zone || '';

  // ZONE-DRIVEN HARD MAPPINGS (most reliable signal)
  // D7-D14 = back-wall + upper-left beer cooler banks → Beer (with sub-types)
  if (zone.match(/^D(7|8|9|10|11|12|13|14)$/)) {
    if (name.match(/twisted tea|truly|white claw|high noon|n[üu]trl|cutwater|surfside|sun cruiser|sun king|seltzer|spiked|wynk|cann|plift|br[ēe]z|hi5|topo chico hard|rolling loud|surge|vizzy|monaco|beatbox|buzzball|surfside|hard mtn dew|hard mountain dew/)) {
      return 'RTD / Seltzer';
    }
    if (name.match(/n\.a\.|non-alc|non-alcoh|0\.0|athletic|hop wtr|ipna|best day|halo|guinness 0\.0|heineken 0\.0/)) {
      return 'N.A. Beer';
    }
    if (name.match(/cider|magners/)) return 'Cider';
    return 'Beer';
  }

  // D15 = singles + 4-pks (mostly beer + some RTD)
  if (zone === 'D15') {
    if (name.match(/twisted tea|truly|white claw|high noon|n[üu]trl|cutwater|surfside|sun cruiser|seltzer|surge|vizzy|monaco|beatbox|wynk|cann|plift/)) return 'RTD / Seltzer';
    return 'Beer';
  }

  // D16 = High Noon + RTD anchor
  if (zone === 'D16') {
    if (name.match(/wynk|delta-9|thc|cann|plift|br[ēe]z|hi5/)) return 'THC Beverage';
    return 'RTD / Seltzer';
  }

  // D17, D18 = Champagne / Sparkling + Hard Seltzer
  if (zone === 'D17' || zone === 'D18') {
    if (name.match(/champagne|prosecco|brut|cremant|cava|sparkling|chandon|veuve|pol roger|moet|moët|billecart|peters|p[ée]ters|mumm|ruinart|egly|larmandier|cordon|korbel|j roget|andre|asti|cupcake prosecco|martini|stella rosa|jcb|dark horse/)) {
      return 'Champagne / Sparkling';
    }
    if (name.match(/twisted tea|truly|white claw|topo chico hard|vizzy|surge|seltzer|modelo chelada|chelada|high noon|n[üu]trl|cutwater|surfside|sun cruiser|hard mtn dew|hard mountain dew/)) return 'Hard Seltzer';
    if (name.match(/mr\.? black|liqueur|cold brew/)) return 'Liqueur';
    return 'Wine';
  }

  // D19, D20 = white wine + rosé cooler
  if (zone === 'D19' || zone === 'D20') {
    if (name.match(/ros[ée]|rosato|whispering angel|garz[óo]n/)) return 'Rosé Wine';
    return 'White Wine';
  }

  // D21 = Red Bull DSD lock
  if (zone === 'D21') return 'Energy Drinks';

  // D22 = Poppi/Monaco/BeatBox impulse cooler
  if (zone === 'D22') {
    if (name.match(/buzzball/)) return 'RTD / Cocktails';
    if (name.match(/beatbox/)) return 'Wine RTD / Cocktails';
    if (name.match(/monaco|mason|hello bello|señorita|long island|margarita/)) return 'RTD / Cocktails';
    return 'RTD / Cocktails';
  }

  // D6 — multi-cat juice / dairy / eggs
  if (zone === 'D6') {
    if (name.match(/yerba|pure leaf|hai|coconut water/)) return 'Tea / Coconut';
    if (name.match(/gatorade|powerade/)) return 'Sport Drinks';
    if (name.match(/pure |simply|mott|tropicana|orange juice|apple juice|fruit punch|grapefruit/)) return 'Juice';
    if (name.match(/butter|cheese|sour cream|cream|imperial|land o lakes|daisy|philadelphia|dean|reddi|lactaid|milk|egg/)) return 'Dairy / Eggs';
    if (name.match(/arizona|iced tea/)) return 'Iced Tea';
    return 'Juice / Dairy';
  }

  // D5 — Yerba/Pure tea/AriZona/Electrolit
  if (zone === 'D5') {
    if (name.match(/yerba|pure leaf|iced tea|arizona/)) return 'Tea / Yerba';
    if (name.match(/gatorade|powerade|electrolit|bodyarmor|liquid iv|lmnt|hydration/)) return 'Sport / Electrolyte';
    if (name.match(/starbucks|frappuccino|doubleshot|espresso/)) return 'RTD Coffee';
    if (name.match(/protein|premier|fairlife/)) return 'Protein Drink';
    if (name.match(/lime|lemon/)) return 'Produce';
    return 'Tea / Yerba';
  }

  // D4 — protein / Bodyarmor / Gatorade Zero / dairy
  if (zone === 'D4') {
    if (name.match(/protein|premier|fairlife|core power/)) return 'Protein Drink';
    if (name.match(/bodyarmor|gatorade|powerade|electrolit/)) return 'Sport Drinks';
    if (name.match(/vitamin water|smartwater|essentia/)) return 'Enhanced Water';
    if (name.match(/arizona|pure leaf|iced tea/)) return 'Iced Tea';
    if (name.match(/starbucks|frappuccino|doubleshot|espresso|la colombe|stumptown|cold brew/)) return 'RTD Coffee';
    if (name.match(/lactaid|milk|cream|half|butter|reddi/)) return 'Dairy';
    return 'Protein / Sport';
  }

  // D3 — Energy + premium water + Monster
  if (zone === 'D3') {
    if (name.match(/monster|red bull|bang|reign|celsius|phora|ghost|storm|rockstar|nos|alani/)) return 'Energy Drinks';
    if (name.match(/water|fiji|evian|smartwater|essentia|core hydration|pellegrino|topo chico|jumex|liquid death|saratoga/)) return 'Water';
    if (name.match(/v8|kombucha|olipop|poppi|culture pop|health[- ]?ade|gt/)) return 'Functional Beverage';
    if (name.match(/jumex|nectar/)) return 'Juice';
    return 'Energy / Water';
  }

  // D2 — specialty soda + tonic + 2L
  if (zone === 'D2') {
    if (name.match(/tonic|club soda|club|seltzer water|sparkling water|pellegrino/)) return 'Tonic / Mixers';
    if (size.match(/2l|1l|1\.5l|liter/) || name.match(/2l|1l/)) return 'Large Format CSD';
    return 'Specialty Soda';
  }

  // D1 — Pepsi-Coke CSD wall
  if (zone === 'D1') {
    if (size.match(/2l|liter/) || name.match(/2l\b/)) return 'Large Format CSD';
    if (name.match(/12-?pk|12 pk|12pk|12 pack/)) return 'CSD 12-Packs';
    if (name.match(/12oz can|12 oz can/) || size.match(/12oz/)) return 'CSD Cans';
    return 'CSD 20oz Bottles';
  }

  // BC-1 = back wine / spirits wall
  if (zone === 'BC-1') {
    if (name.match(/champagne|prosecco|brut|cremant|cava|sparkling|chandon|veuve|pol roger/)) return 'Champagne / Sparkling';
    // SPIRITS — broad coverage of all major brand families + generic types
    if (name.match(/whiskey|whisky|bourbon|rye|scotch|cognac|brandy|armagnac|tequila|mezcal|vodka|gin|rum|cordial|schnapps/)) return 'Spirits';
    if (name.match(/hennessy|courvoisier|remy|martell|jack daniel|crown royal|woodford|angel.s envy|angels envy|blanton|eagle rare|buffalo trace|jameson|maker.s mark|makers mark|jim beam|knob creek|wild turkey|four roses|basil hayden|bulleit|johnnie walker|chivas|glenlivet|glenfiddich|macallan|laphroaig|lagavulin|early times/)) return 'Spirits';
    if (name.match(/tito|grey goose|absolut|smirnoff|stoli|stolichnaya|belvedere|ketel one|svedka|new amsterdam|skyy|three olives|deep eddy|chopin|hangar/)) return 'Spirits';
    if (name.match(/patr[óo]n|casamigos|don julio|clase azul|herradura|el jimador|1800|jose cuervo|josé cuervo|cuervo|hornitos|milagro|cazadores|espol[óòo]n|tres generaciones|olmeca|teremana/)) return 'Spirits';
    if (name.match(/bacardi|captain morgan|malibu|kraken|sailor jerry|mount gay|appleton|gosling|myers|don q/)) return 'Spirits';
    if (name.match(/tanqueray|bombay sapphire|beefeater|hendrick|aviation|gordon|seagram|plymouth|sipsmith|monkey 47|the botanist|nolet/)) return 'Spirits';
    if (name.match(/fireball|m[äa]l[öo]rt|jeppson|koval|few|rumple minze|goldschlager|99 bananas|dr mcgillicuddy|pinnacle|burnett|vedka/)) return 'Spirits';
    if (name.match(/rumchata|j[äa]germeister|jagermeister|kahl[úu]a|kahlua|baileys|frangelico|amaretto|disaronno|sambuca|grand marnier|cointreau|triple sec|chambord|chartreuse|drambuie|galliano/)) return 'Liqueur';
    if (name.match(/aperol|campari|fernet|st-?germain|lillet|cynar|amaro|averna|montenegro|cardamaro|ramazzotti|nonino|punt e mes|carpano|antica/)) return 'Aperitif / Liqueur';
    if (name.match(/port|sherry|madeira|marsala|vermouth/)) return 'Fortified Wine';
    if (name.match(/ros[ée]|rosato/)) return 'Rosé Wine';
    if (name.match(/sangria|wine cooler/)) return 'Sangria / Wine Cooler';
    if (name.match(/pinot grigio|pinot gris|sauvignon blanc|chardonnay|riesling|moscato|gewurz|albari[ñn]o|verdejo|chenin|gr[üu]ner/)) return 'White Wine';
    if (name.match(/cabernet|merlot|pinot noir|zinfandel|malbec|tempranillo|nebbiolo|sangiovese|syrah|shiraz|grenache|garnacha|carmenere|red blend/)) return 'Red Wine';
    return 'Wine';
  }

  if (zone === 'BC-2') {
    if (name.match(/condom|trojan|durex|lubricant|ky|astroglide|contraceptive|plan b|pregnancy/)) return 'Personal Care';
    if (name.match(/kratom/)) return 'Kratom';
    if (name.match(/cbd|delta-?8|delta-?9|hemp gummy|thc gummy|cannabis/)) return 'CBD / Cannabis';
    if (name.match(/tylenol|advil|aleve|excedrin|pepto|allergy|cold|cough|otc/)) return 'OTC Health';
    if (name.match(/sanitizer|wipe/)) return 'Sanitizer';
    if (name.match(/travel|bath salt|mini shampoo|mini lotion/)) return 'Travel Sundries';
    return 'Sundries';
  }

  // OC-1 = over-counter cigs/vape/lottery/sundries
  if (zone === 'OC-1') {
    if (name.match(/marlboro|newport|camel|american spirit|parliament|cigarette/)) return 'Cigarettes';
    if (name.match(/black & mild|swisher|backwoods|white owl|cigarillo|cigar|wrap/)) return 'Cigars / Cigarillos';
    if (name.match(/zyn|on!|velo|nicotine pouch|lucy/)) return 'Nicotine Pouches';
    if (name.match(/elf bar|lost mary|geek bar|esco bar|raz|fume|breeze|mr fog|disposable vape|vape pen|vape mod|juul|njoy/)) return 'Vape';
    if (name.match(/wynk|cann|delta-9|delta 9|delta-8|delta 8|thc gummy|thc edible|cbd gummy/)) return 'Cannabis Edibles';
    if (name.match(/kratom/)) return 'Kratom';
    if (name.match(/cbd|hemp/)) return 'CBD';
    if (name.match(/lottery|scratch|mega million|powerball|lucky day/)) return 'Lottery';
    if (name.match(/lighter|bic|clipper|zippo/)) return 'Lighters';
    if (name.match(/zig-zag|raw|ocb|rolling paper|paper|filter/)) return 'Rolling Papers';
    if (name.match(/condom|trojan|durex/)) return 'Personal Care';
    if (name.match(/charger|cable|earbud|headphone/)) return 'Phone / Tech';
    if (name.match(/tylenol|advil|aleve|excedrin|pepto|visine|otc|antacid|tums/)) return 'OTC Health';
    if (name.match(/5-?hour|5 hour|stacker|energy shot/)) return 'Energy Shots';
    if (name.match(/50ml|airline|mini bottle|fireball mini/)) return 'Mini Liquor';
    return 'Counter Goods';
  }

  // F1, F2, F3 = freezers
  if (zone.startsWith('F')) {
    if (name.match(/beyond|impossible|plant-?based|tofurky|gardein|morningstar/)) return 'Plant-Based Frozen';
    if (name.match(/cutwater frozen|mom water|skinny mixes|frozen margarita|frozen daiquiri|frozen cocktail|frozen pouch/)) return 'Frozen Cocktails';
    if (name.match(/ice cream|haagen|haagen-dazs|h[äa]agen-?dazs|ben & jerry|talenti|magnum|halo top|skinny cow|klondike|drumstick/)) return 'Ice Cream';
    if (name.match(/pizza|hot pocket|bagel bite|totino|digiorno|sliders|burrito|caulipower|banza|tattooed chef|amy/)) return 'Frozen Meals';
    if (name.match(/dumpling|samosa|sushi|pho|ramen bowl|nona lim|yamachan|patel|bibigo/)) return 'Frozen Asian';
    if (name.match(/daily harvest|bowl|rotisserie|roli roti/)) return 'Frozen Premium Meals';
    if (name.match(/fruit|smoothie pack|blend pack|berry pack/)) return 'Frozen Fruit / Smoothie';
    if (name.match(/ice|cube|crushed|bag of ice/)) return 'Bagged Ice';
    return 'Frozen';
  }

  // G1, G2 = lower gondola (snack/candy)
  if (zone === 'G1' || zone === 'G1.5') {
    if (name.match(/lay|doritos|cheetos|ruffles|pringles|fritos|tostitos|popcorn|skinny pop|pop corners|pipcorn|cheez-it|chip|pretzel|snack mix|cracker|hu crackers|hu cracker|simple mills/)) return 'Salty Snacks';
    if (name.match(/jerky|chomps|biltong|meat stick|slim jim|country archer|jack link/)) return 'Jerky / Meat';
    if (name.match(/oreo|chip ahoy|tate|chocolate chip cookie|stroopwafel|nutter butter|cookie/)) return 'Cookies';
    if (name.match(/compart[ée]s|vosges|mast brothers|tony|premium chocolate|chocolate bar|hu chocolate/)) return 'Premium Chocolate';
    if (name.match(/snickers|m&m|skittles|reese|kit kat|twix|hershey|candy|gummy|sour|haribo|starburst/)) return 'Candy';
    if (name.match(/liquid iv|lmnt|dripdrop|drip drop|pedialyte|morning recovery|hydration|electrolyte|nuun|propel|skratch|salt stick/)) return 'Electrolyte / Recovery';
    return 'Snacks';
  }

  if (zone === 'G2' || zone === 'G2.5') {
    if (name.match(/oreo|chip ahoy|tate|stroopwafel|nutter butter|cookie|wafer|biscuit|nutella/)) return 'Cookies';
    if (name.match(/snickers|m&m|skittles|reese|kit kat|twix|hershey|candy|gummy|sour|haribo|starburst|mentos|gum|trident|extra|orbit/)) return 'Candy / Gum';
    if (name.match(/compart[ée]s|vosges|mast brothers|tony|premium chocolate|chocolate bar|hu chocolate/)) return 'Premium Chocolate';
    return 'Sweets';
  }

  // G3 = diversified snack/pantry gondola
  if (zone === 'G3') {
    if (name.match(/lay|doritos|cheetos|cheez-it|pringles|tostitos|fritos|skinny pop|pop corners|chip|pretzel|snack mix|rold gold|snyder/)) return 'Salty Snacks';
    if (name.match(/oreo|chip ahoy|tate|stroopwafel|nutter butter|nutella|cookie|wafer|biscuit|bueno|bahlsen|hostess|donette|twinkie/)) return 'Cookies / Sweets';
    if (name.match(/jack link|country archer|slim jim|jerky|meat stick|pepperoni|biltong/)) return 'Jerky / Meat';
    if (name.match(/kind|clif|rxbar|david|built|quest|barebells|pure protein|protein bar|aloha|gomacro|kate|perfect bar|ONE bar|one bar/i)) return 'Protein / Energy Bars';
    if (name.match(/planters|wonderful|sahale|trail mix|nut mix|almond|pistachio|cashew|peanut/)) return 'Nuts / Trail Mix';
    if (name.match(/rao|prego|ragu|barilla|pasta sauce|marinara|vodka sauce|arrabbiata/)) return 'Pasta Sauce';
    if (name.match(/maruchan|cup noodle|nissin|top ramen|ramen|cup of soup|instant/)) return 'Instant Soup / Ramen';
    if (name.match(/kraft|annie|mac|cheese cup|easy mac/)) return 'Mac & Cheese';
    if (name.match(/ketchup|mustard|mayo|hellmann|heinz|french|sriracha|hot sauce|cholula|tabasco|condiment|maggi|bouillon|better than/)) return 'Condiments / Pantry';
    if (name.match(/pirate|popcorn|booty/)) return 'Snacks';
    return 'Snacks / Pantry';
  }

  // G4 = curated wine reset
  if (zone === 'G4' || zone === 'G4.5') {
    if (name.match(/champagne|prosecco|brut|cremant|cava|sparkling|chandon|veuve|pol roger|moet|moët|billecart|peters|p[ée]ters|mumm|ruinart|egly|larmandier|cordon/)) return 'Champagne / Sparkling';
    if (name.match(/sake|soju|shochu|whisky|whiskey|hakushu|hibiki|nikka|suntory|toki/)) return 'Sake / Japanese Spirits';
    if (name.match(/ros[ée]|rosato|whispering angel/)) return 'Rosé Wine';
    if (name.match(/sancerre|pouilly|muscadet|vouvray|chablis|sauvignon|albari[ñn]o|verdejo|chardonnay|pinot grigio|riesling|chenin|gewurz|moscato/)) return 'White Wine';
    if (name.match(/nebbiolo|barolo|barbaresco|chianti|sangiovese|tempranillo|ribera|rioja|garnacha|grenache|mencia|aglianico|cabernet|merlot|pinot noir|zinfandel|malbec|carmenere|syrah|shiraz|red blend|biodynamic/)) return 'Red Wine';
    if (name.match(/madeira|port|sherry/)) return 'Fortified Wine';
    return 'Wine';
  }

  if (zone === 'G3.5') return 'Functional / Adaptogen';

  // S-shelves (sundries / HBA on walls)
  if (zone.startsWith('S')) {
    if (name.match(/tylenol|advil|aleve|excedrin|pepto|visine|otc|cold|cough|antihistamine/)) return 'OTC Health';
    if (name.match(/dove|old spice|axe|secret|deodorant|body wash|shampoo|crest|colgate|sensodyne|listerine|toothbrush|mouthwash/)) return 'HBA';
    if (name.match(/sunscreen|sunblock|spf|coppertone|banana boat|aloe/)) return 'Sun Care';
    if (name.match(/tampax|always|maxi|pad|tampon|feminine|summer\u2019s eve/)) return 'Feminine Care';
    if (name.match(/sanitizer|purell|germ-?x/)) return 'Sanitizer';
    if (name.match(/bounty|sparkle|paper towel|scott|charmin|toilet paper|tissue|kleenex|napkin|vanity fair|cottonelle/)) return 'Paper Goods';
    if (name.match(/tide|gain|xtra|all|persil|laundry|detergent|dryer|fabric softener/)) return 'Laundry';
    if (name.match(/clorox|lysol|ajax|fabuloso|pinesol|cleaner|disinfectant/)) return 'Cleaning';
    if (name.match(/foil|aluminum tray|plastic wrap|saran|ziploc|baggie|trash bag|hefty/)) return 'Wrap / Bags';
    return 'Sundries';
  }

  // FALLBACK
  return 'Other';
}


// ============================================================
// renderFixtureInvTable — reusable inventory table for any fixture.
// 5-row scrollable body, fixed header, pinned totals row at bottom.
// Use under any fixture's planogram to itemize SKUs + per-line cost + totals.
// Args: shelves (array of {tier, tiles}), label (e.g. "BEFORE"), accentColor, fixtureTag.
// ============================================================
function renderFixtureInvTable(shelves, label, accentColor, fixtureTag) {
  const fmtMoney = n => '$' + Math.round(n).toLocaleString();
  const rows = shelves.flatMap((s, si) => (s.tiles || []).map(t => {
    const facings = t.facings || 1;
    const stacked = t.stacked || 1;
    const depth = t.depth || (typeof inferDepth === 'function' ? inferDepth(t.format) : 1);
    const units = facings * stacked * depth;
    const unitCost = parseFloat(t.cost) || 0;
    const lineCost = units * unitCost;
    return { shelf: shelves.length - si, name: t.name, format: t.format || '', status: t.status || 'keep', facings, stacked, depth, units, unitCost, lineCost };
  }));
  // Split totals: KEPT (status not 'remove') vs REMOVED (status === 'remove')
  const keepRows   = rows.filter(r => r.status !== 'remove');
  const removeRows = rows.filter(r => r.status === 'remove');
  const keepUnits   = keepRows.reduce((s, r) => s + r.units, 0);
  const removeUnits = removeRows.reduce((s, r) => s + r.units, 0);
  const keepCost   = keepRows.reduce((s, r) => s + r.lineCost, 0);
  const removeCost = removeRows.reduce((s, r) => s + r.lineCost, 0);
  const grandTotalUnits = rows.reduce((s, r) => s + r.units, 0);
  const grandTotalCost  = rows.reduce((s, r) => s + r.lineCost, 0);
  const removeSuffix = removeRows.length > 0 ? ` <span style="color:#cc6666;">(remove ${removeRows.length} SKU · ${removeUnits} units · ${fmtMoney(removeCost)})</span>` : '';
  const statusBadge = (st) => {
    const colors = { keep:'#4d7ec2', new:'#5dcaa5', expand:'#efb045', remove:'#cc6666' };
    const labels = { keep:'KEEP', new:'NEW', expand:'EXPAND', remove:'REMOVE' };
    const c = colors[st] || '#4d7ec2';
    const l = labels[st] || 'KEEP';
    return `<span style="display:inline-block;font-family:monospace;font-size:9.5px;font-weight:700;color:${c};background:${c}1a;border:1px solid ${c}66;padding:1px 5px;border-radius:2px;letter-spacing:0.5px;">${l}</span>`;
  };
  const colW = ['7%','22%','17%','11%','10%','9%','11%','13%'];
  const headCss = 'text-align:left;padding:6px 8px;font-weight:600;color:var(--muted);font-size:9.5px;letter-spacing:0.6px;text-transform:uppercase;';
  const cellBase = 'padding:5px 8px;font-size:11px;line-height:1.3;';
  return `
    <div style="margin-top:14px;background:rgba(0,0,0,0.32);border:1px solid rgba(255,255,255,0.08);border-radius:6px;overflow:hidden;">
      <div style="padding:8px 14px;background:${accentColor}22;border-bottom:1px solid ${accentColor}66;display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;">
        <strong style="color:${accentColor};font-size:12px;letter-spacing:0.8px;">${label} — Inventory list</strong>
        <span style="font-family:monospace;font-size:11px;color:#fff;">${keepRows.length} kept SKU · ${keepUnits} units · <strong style="color:${accentColor};">${fmtMoney(keepCost)}</strong>${removeSuffix}</span>
      </div>
      <table style="width:100%;border-collapse:collapse;table-layout:fixed;">
        <colgroup>${colW.map(w => `<col style="width:${w};"/>`).join('')}</colgroup>
        <thead><tr style="background:rgba(0,0,0,0.4);">
          <th style="${headCss}padding-left:10px;">SH</th>
          <th style="${headCss}">Product</th>
          <th style="${headCss}">Format</th>
          <th style="${headCss}text-align:center;">Status</th>
          <th style="${headCss}text-align:right;">F×S×D</th>
          <th style="${headCss}text-align:right;">Units</th>
          <th style="${headCss}text-align:right;">$/unit</th>
          <th style="${headCss}text-align:right;padding-right:10px;">Total $</th>
        </tr></thead>
      </table>
      <div style="max-height:160px;overflow-y:auto;">
        <table style="width:100%;border-collapse:collapse;table-layout:fixed;">
          <colgroup>${colW.map(w => `<col style="width:${w};"/>`).join('')}</colgroup>
          <tbody>
            ${rows.map(r => `
              <tr style="border-top:1px solid rgba(255,255,255,0.04);${r.status === 'remove' ? 'opacity:0.7;' : ''}">
                <td style="${cellBase}padding-left:10px;font-family:monospace;color:var(--muted);">${r.shelf}</td>
                <td style="${cellBase}color:#fff;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.name}</td>
                <td style="${cellBase}color:var(--muted);font-size:10.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.format}</td>
                <td style="${cellBase}text-align:center;">${statusBadge(r.status)}</td>
                <td style="${cellBase}text-align:right;font-family:monospace;color:var(--muted);font-size:10.5px;">${r.facings}${r.stacked > 1 ? '×' + r.stacked + '↕' : ''}×${r.depth}</td>
                <td style="${cellBase}text-align:right;font-family:monospace;color:#fff;">${r.units}</td>
                <td style="${cellBase}text-align:right;font-family:monospace;color:var(--muted);">$${r.unitCost.toFixed(2)}</td>
                <td style="${cellBase}padding-right:10px;text-align:right;font-family:monospace;color:#fff;font-weight:600;">${fmtMoney(r.lineCost)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
      <table style="width:100%;border-collapse:collapse;table-layout:fixed;background:${accentColor}22;border-top:2px solid ${accentColor};">
        <colgroup>${colW.map(w => `<col style="width:${w};"/>`).join('')}</colgroup>
        <tbody><tr>
          <td colspan="5" style="padding:9px 10px;text-align:right;font-weight:700;color:${accentColor};letter-spacing:0.5px;font-size:11.5px;">${fixtureTag} ${label.toUpperCase()} TOTAL — KEPT${removeRows.length > 0 ? ' (REMOVE)' : ''}</td>
          <td style="padding:9px 8px;text-align:right;font-family:monospace;font-weight:700;color:#fff;font-size:11.5px;">${keepUnits}${removeRows.length > 0 ? ` <span style="color:#cc6666;">(${removeUnits})</span>` : ''} units</td>
          <td></td>
          <td style="padding:9px 10px;text-align:right;font-family:monospace;font-weight:700;color:${accentColor};font-size:13.5px;">${fmtMoney(keepCost)}${removeRows.length > 0 ? ` <span style="color:#cc6666;font-size:11px;">(${fmtMoney(removeCost)})</span>` : ''}</td>
        </tr></tbody>
      </table>
    </div>`;
}

// ============================================================
// DOOR_REGISTRY — module-scope cache populated by each wall renderer
// Lets renderSingleDoor(tag) access any door's config + shelves data.
// Walls populate this on first render; door-d1..d22 slides read from it.
// ============================================================
const DOOR_REGISTRY = { configs: {}, shelves: {}, walls: {} };
function registerDoorWallData(wallId, doors, shelfData) {
  doors.forEach(d => {
    DOOR_REGISTRY.configs[d.tag] = d;
    DOOR_REGISTRY.walls[d.tag] = wallId;
  });
  Object.assign(DOOR_REGISTRY.shelves, shelfData);
}

// ============================================================
// renderSingleDoor(tag) — single-door slide: BEFORE on top, AFTER on bottom
// Reads from DOOR_REGISTRY (populated when wall renderers run).
// Each shelf renders as a row of individual 1×depth tiles to physical scale.
// ============================================================
function renderSingleDoor(tag) {
  const cfg = DOOR_REGISTRY.configs[tag];
  const shelves = DOOR_REGISTRY.shelves[tag] || [];
  const wallSlide = DOOR_REGISTRY.walls[tag] || 'floorplan';
  if (!cfg) {
    return `<h2 class="slide-title">${tag} — door data not loaded</h2>
      <p class="slide-subtitle">Wall data hasn't been populated yet. Visit the parent wall slide once, then return.</p>`;
  }

  const isBeforeTile = t => t.status === 'keep' || t.status === 'remove' || t.status === 'expand' || !t.status;
  const isAfterTile  = t => t.status === 'keep' || t.status === 'new' || t.status === 'expand' || !t.status;
  const filterShelf = (shelf, predicate) => ({ ...shelf, tiles: (shelf.tiles || []).filter(predicate) });
  const beforeShelves = shelves.map(s => filterShelf(s, isBeforeTile));
  const afterShelves  = shelves.map(s => filterShelf(s, isAfterTile));

  const fmtMoney = n => '$' + Math.round(n).toLocaleString();
  const shelvesCost = (sh) => sh.flatMap(s => s.tiles || []).reduce((sum, t) => sum + (parseFloat(t.cost) || 0) * (t.facings || 1), 0);
  const totalUnits = (sh) => sh.flatMap(s => s.tiles || []).reduce((sum, t) => {
    const d = t.depth || inferDepth(t.format);
    return sum + (t.facings || 1) * (t.stacked || 1) * d;
  }, 0);

  const beforeCost = shelvesCost(beforeShelves);
  const afterCost  = shelvesCost(afterShelves);
  const beforeUnits = totalUnits(beforeShelves);
  const afterUnits  = totalUnits(afterShelves);
  const newCount = shelves.flatMap(s => s.tiles || []).filter(t => t.status === 'new').length;
  const removeCount = shelves.flatMap(s => s.tiles || []).filter(t => t.status === 'remove').length;

  const renderShelvesStack = (shelfArr) => shelfArr.map((s, i) =>
    renderTileShelfBand(s, i, shelfArr.length, '#85B7EB')
  ).join('');

  // Inventory table — itemized list with pricing per SKU and grand total.
  const renderInvTable = (shelfArr, label, accentColor) => {
    const rows = shelfArr.flatMap((s, si) => (s.tiles || []).map(t => {
      const facings = t.facings || 1;
      const stacked = t.stacked || 1;
      const depth = t.depth || inferDepth(t.format);
      const units = facings * stacked * depth;
      const unitCost = parseFloat(t.cost) || 0;
      const lineCost = units * unitCost;
      return {
        shelf: shelfArr.length - si,
        name: t.name,
        format: t.format || '',
        status: t.status || 'keep',
        facings, stacked, depth, units, unitCost, lineCost,
      };
    }));
    const grandTotalUnits = rows.reduce((s, r) => s + r.units, 0);
    const grandTotalCost  = rows.reduce((s, r) => s + r.lineCost, 0);
    const statusBadge = (st) => {
      const colors = { keep:'#4d7ec2', new:'#5dcaa5', expand:'#efb045', remove:'#cc6666' };
      const labels = { keep:'KEEP', new:'NEW', expand:'EXPAND', remove:'REMOVE' };
      const c = colors[st] || '#4d7ec2';
      const l = labels[st] || 'KEEP';
      return `<span style="display:inline-block;font-family:monospace;font-size:9.5px;font-weight:700;color:${c};background:${c}1a;border:1px solid ${c}66;padding:1px 5px;border-radius:2px;letter-spacing:0.5px;">${l}</span>`;
    };
    // Column widths shared between header / body / total rows so columns line up
    // even when body scrolls. Order: SH · Product · Format · Status · F×S×D · Units · $/unit · Total $
    const colW = ['7%','22%','17%','11%','10%','9%','11%','13%'];
    const headCss = 'text-align:left;padding:6px 8px;font-weight:600;color:var(--muted);font-size:9.5px;letter-spacing:0.6px;text-transform:uppercase;';
    const cellBase = 'padding:5px 8px;font-size:11px;line-height:1.3;';
    return `
      <div style="margin-top:14px;background:rgba(0,0,0,0.32);border:1px solid rgba(255,255,255,0.08);border-radius:6px;overflow:hidden;">
        <div style="padding:8px 14px;background:${accentColor}22;border-bottom:1px solid ${accentColor}66;display:flex;justify-content:space-between;align-items:baseline;">
          <strong style="color:${accentColor};font-size:12px;letter-spacing:0.8px;">${label} — Inventory list</strong>
          <span style="font-family:monospace;font-size:11px;color:#fff;">${rows.length} SKUs · ${grandTotalUnits} units · <strong style="color:${accentColor};">${fmtMoney(grandTotalCost)}</strong></span>
        </div>
        <!-- Fixed header (sticky position-style, never scrolls) -->
        <table style="width:100%;border-collapse:collapse;table-layout:fixed;">
          <colgroup>${colW.map(w => `<col style="width:${w};"/>`).join('')}</colgroup>
          <thead>
            <tr style="background:rgba(0,0,0,0.4);">
              <th style="${headCss}padding-left:10px;">SH</th>
              <th style="${headCss}">Product</th>
              <th style="${headCss}">Format</th>
              <th style="${headCss}text-align:center;">Status</th>
              <th style="${headCss}text-align:right;">F×S×D</th>
              <th style="${headCss}text-align:right;">Units</th>
              <th style="${headCss}text-align:right;">$/unit</th>
              <th style="${headCss}text-align:right;padding-right:10px;">Total $</th>
            </tr>
          </thead>
        </table>
        <!-- Scrollable body — 5 rows visible (~32px each = ~160px) -->
        <div style="max-height:160px;overflow-y:auto;">
          <table style="width:100%;border-collapse:collapse;table-layout:fixed;">
            <colgroup>${colW.map(w => `<col style="width:${w};"/>`).join('')}</colgroup>
            <tbody>
              ${rows.map(r => `
                <tr style="border-top:1px solid rgba(255,255,255,0.04);${r.status === 'remove' ? 'opacity:0.7;' : ''}">
                  <td style="${cellBase}padding-left:10px;font-family:monospace;color:var(--muted);">${r.shelf}</td>
                  <td style="${cellBase}color:#fff;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.name}</td>
                  <td style="${cellBase}color:var(--muted);font-size:10.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.format}</td>
                  <td style="${cellBase}text-align:center;">${statusBadge(r.status)}</td>
                  <td style="${cellBase}text-align:right;font-family:monospace;color:var(--muted);font-size:10.5px;">${r.facings}${r.stacked > 1 ? '×' + r.stacked + '↕' : ''}×${r.depth}</td>
                  <td style="${cellBase}text-align:right;font-family:monospace;color:#fff;">${r.units}</td>
                  <td style="${cellBase}text-align:right;font-family:monospace;color:var(--muted);">$${r.unitCost.toFixed(2)}</td>
                  <td style="${cellBase}padding-right:10px;text-align:right;font-family:monospace;color:#fff;font-weight:600;">${fmtMoney(r.lineCost)}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
        <!-- Pinned totals row — always visible below the scroll area -->
        <table style="width:100%;border-collapse:collapse;table-layout:fixed;background:${accentColor}22;border-top:2px solid ${accentColor};">
          <colgroup>${colW.map(w => `<col style="width:${w};"/>`).join('')}</colgroup>
          <tbody>
            <tr>
              <td colspan="5" style="padding:9px 10px;text-align:right;font-weight:700;color:${accentColor};letter-spacing:0.5px;font-size:11.5px;">DOOR ${cfg.tag} ${label.toUpperCase()} TOTAL</td>
              <td style="padding:9px 8px;text-align:right;font-family:monospace;font-weight:700;color:#fff;font-size:11.5px;">${grandTotalUnits} units</td>
              <td></td>
              <td style="padding:9px 10px;text-align:right;font-family:monospace;font-weight:700;color:${accentColor};font-size:13.5px;">${fmtMoney(grandTotalCost)}</td>
            </tr>
          </tbody>
        </table>
      </div>`;
  };

  // Fixture type label — readable summary of what this fixture IS.
  const sdAccent = '#85B7EB';
  const typeLabel = (() => {
    const t = (cfg.type || 'cooler').toLowerCase();
    if (t.includes('freezer')) return 'FREEZER DOOR';
    if (t.includes('endcap'))  return 'ENDCAP';
    if (t.includes('gondola')) return 'GONDOLA';
    if (t.includes('shelf'))   return 'WALL SHELF';
    return 'COOLER DOOR';
  })();
  const dimsStr = '30" W × 84" H × 30" D';

  return `
    <div style="margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap;">
      <span onclick="window.goToSlide('floorplan')" style="cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-size:11px;color:#5dcaa5;background:rgba(93,202,165,0.10);border:1px solid rgba(93,202,165,0.35);padding:5px 11px;border-radius:14px;font-family:monospace;letter-spacing:0.5px;">&larr; Floor plan</span>
      <span onclick="window.goToSlide('inventory')" style="cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-size:11px;color:#efb045;background:rgba(239,176,69,0.10);border:1px solid rgba(239,176,69,0.35);padding:5px 11px;border-radius:14px;font-family:monospace;letter-spacing:0.5px;">&larr; Inventory &amp; cost</span>
    </div>

    <h2 class="slide-title">${cfg.tag} &mdash; ${cfg.name}</h2>
    <p class="slide-subtitle">${cfg.sub || ''}</p>

    <!-- =================================================================== -->
    <!-- COOLER-FIXTURE FRAMES — tight wrap around just the shelves (~580px). -->
    <!-- Inventory tables sit OUTSIDE the cooler frames at full page width.   -->
    <!-- =================================================================== -->
    ${(() => {
      // Each cooler frame = header band + shelves stack, all sized to actual cooler
      // width (540px shelf + 34px shelf-number column + 4px borders + padding).
      // Using display:inline-block + width:fit-content so the frame shrinks to the
      // widest internal element (the 540px shelf row).
      const renderCoolerFrame = (label, shelvesArr, accentCol, summary) => `
        <div style="display:inline-block;width:fit-content;max-width:100%;border:2px solid ${accentCol};border-radius:10px;background:rgba(8,12,18,0.55);overflow:hidden;box-shadow:0 4px 18px rgba(0,0,0,0.35);margin-bottom:14px;">
          <!-- Cooler header band — sized to the frame, wraps gracefully on narrow viewports -->
          <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;background:linear-gradient(180deg, ${accentCol}33 0%, ${accentCol}11 100%);border-bottom:2px solid ${accentCol};padding:10px 14px;">
            <!-- Tag block — fixed size, never shrinks -->
            <div style="display:flex;align-items:center;gap:10px;background:rgba(0,0,0,0.55);border:1.5px solid ${accentCol};border-radius:6px;padding:6px 12px 6px 10px;flex-shrink:0;">
              <span style="font-family:monospace;font-size:24px;font-weight:800;color:#fff;letter-spacing:1.5px;line-height:1;">${cfg.tag}</span>
              <div style="border-left:1px solid rgba(255,255,255,0.25);padding-left:10px;">
                <div style="font-family:monospace;font-size:9px;font-weight:700;color:${accentCol};letter-spacing:1.5px;line-height:1;">${typeLabel}</div>
                <div style="font-family:monospace;font-size:8.5px;color:var(--muted);letter-spacing:0.6px;margin-top:3px;line-height:1;">${dimsStr}</div>
              </div>
            </div>
            <!-- State badge only (BEFORE / AFTER) — summary lives in section header above frame, not duplicated here -->
            <div style="font-family:monospace;font-size:11px;color:${accentCol};letter-spacing:1.5px;font-weight:700;text-transform:uppercase;background:${accentCol}1a;border:1px solid ${accentCol}55;padding:4px 10px;border-radius:3px;line-height:1;">${label}</div>
          </div>
          <!-- Shelves area — horizontal scroll if viewport narrower than 540px shelf row, instead of clipping -->
          <div style="padding:10px 12px;overflow-x:auto;">
            ${renderShelvesStack(shelvesArr)}
          </div>
        </div>`;

      const beforeSummary = `${beforeShelves.flatMap(s => s.tiles).length} SKUs · ${beforeUnits} units · ${fmtMoney(beforeCost)}${removeCount ? ' · <span style="color:#cc6666;">' + removeCount + ' drop</span>' : ''}`;
      const afterSummary  = `${afterShelves.flatMap(s => s.tiles).length} SKUs · ${afterUnits} units · ${fmtMoney(afterCost)}${newCount ? ' · <span style="color:#5dcaa5;">' + newCount + ' new</span>' : ''}`;

      return `
        <!-- BEFORE block: tight cooler frame + full-width inventory list -->
        <div style="margin-bottom:24px;">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;border-bottom:2px solid var(--coral);padding-bottom:5px;">
            <h3 style="font-size:15px;color:#fff;letter-spacing:0.5px;margin:0;">⊟ BEFORE — Existing</h3>
            <div style="font-size:10.5px;color:var(--muted);font-family:monospace;letter-spacing:0.5px;">${beforeSummary}</div>
          </div>
          ${renderCoolerFrame('BEFORE', beforeShelves, '#cc6666', beforeSummary)}
          ${renderInvTable(beforeShelves, 'BEFORE', '#cc6666')}
        </div>

        <!-- AFTER block: tight cooler frame + full-width inventory list -->
        <div style="margin-bottom:14px;">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;border-bottom:2px solid var(--teal);padding-bottom:5px;">
            <h3 style="font-size:15px;color:#fff;letter-spacing:0.5px;margin:0;">⊞ AFTER — Repositioned</h3>
            <div style="font-size:10.5px;color:var(--muted);font-family:monospace;letter-spacing:0.5px;">${afterSummary}</div>
          </div>
          ${renderCoolerFrame('AFTER', afterShelves, '#5dcaa5', afterSummary)}
          ${renderInvTable(afterShelves, 'AFTER', '#5dcaa5')}
        </div>`;
    })()}`;
}

// ============================================================
// renderDoorWall — DRY helper for D-door cooler walls
// Renders title + subtitle + 5-col header card (wall summary)
// + status legend + per-door blocks (LEFT: tile bands · RIGHT:
// inventory cost panel) + optional Schedule A note. Reused by
// elev-lower-left, elev-top, elev-upper-left, elev-right.
// ============================================================
function renderDoorWall(opts) {
  const {
    title, subtitle, wallLabel,
    doors, shelfData,
    defaultDimStr, doorDimsByTag = {},
    distributorsLine,
    scheduleANote,
  } = opts;

  const fmtMoney = n => '$' + Math.round(n).toLocaleString();
  const dimsFor = tag => doorDimsByTag[tag] || defaultDimStr;
  const accent = '#85B7EB';

  // BEFORE = current state: keep + remove + expand (existing facings)
  // AFTER  = post-repositioning: keep + new + expand
  const isBeforeTile = t => t.status === 'keep' || t.status === 'remove' || t.status === 'expand' || !t.status;
  const isAfterTile  = t => t.status === 'keep' || t.status === 'new' || t.status === 'expand' || !t.status;

  function filterShelf(shelf, predicate) {
    return { ...shelf, tiles: (shelf.tiles || []).filter(predicate) };
  }
  function shelvesCost(shelves) {
    return shelves.flatMap(s => s.tiles || []).reduce((sum, t) => sum + (parseFloat(t.cost) || 0) * (t.facings || 1), 0);
  }

  const doorStats = doors.map(d => {
    const shelves = shelfData[d.tag] || [];
    const beforeShelves = shelves.map(s => filterShelf(s, isBeforeTile));
    const afterShelves  = shelves.map(s => filterShelf(s, isAfterTile));
    const tiles = shelves.flatMap(s => s.tiles || []);
    return {
      tag: d.tag,
      shelfCount: shelves.length,
      skus: tiles.length,
      beforeShelves, afterShelves,
      beforeSkus: beforeShelves.flatMap(s => s.tiles).length,
      afterSkus:  afterShelves.flatMap(s => s.tiles).length,
      beforeCost: shelvesCost(beforeShelves),
      afterCost:  shelvesCost(afterShelves),
      newCount: tiles.filter(t => t.status === 'new').length,
      expandCount: tiles.filter(t => t.status === 'expand').length,
      removeCount: tiles.filter(t => t.status === 'remove').length,
    };
  });
  const wallTotalSkus = doorStats.reduce((s, d) => s + d.skus, 0);
  const wallNewCount = doorStats.reduce((s, d) => s + d.newCount, 0);
  const wallRemoveCount = doorStats.reduce((s, d) => s + d.removeCount, 0);
  const wallBeforeCost = doorStats.reduce((s, d) => s + d.beforeCost, 0);
  const wallAfterCost  = doorStats.reduce((s, d) => s + d.afterCost,  0);
  const wallTotalCost = wallAfterCost; // Header card shows AFTER total (the post-repositioning state)

  const doorBlocks = doors.map((door, idx) => {
    const ds = doorStats[idx];
    // Map distributor name (anything containing key words) to a packet slide id.
    const distToSlide = (raw) => {
      const s = (raw || '').toLowerCase();
      if (s.includes('cbs')) return 'pkt-cbs';
      if (s.includes('breakthru')) return 'pkt-breakthru';
      if (s.includes('lakeshore')) return 'pkt-lakeshore';
      if (s.includes('reyes') || s.includes('coke') || s.includes('pepsi') || s.includes('coca-cola')) return 'pkt-reyes';
      if (s.includes('eby') || s.includes('eby-brown')) return 'pkt-eby';
      if (s.includes('kehe') || s.includes('unfi')) return 'pkt-kehe';
      if (s.includes('thc') || s.includes('d9') || s.includes('cresco')) return 'pkt-thc';
      if (s.includes('red bull')) return 'pkt-redbull';
      if (s.includes('southern glaz') || s.includes('sg ') || /\bsg\b/.test(s)) return 'pkt-sg';
      if (s.includes('local') || s.includes('vendor') || s.includes('good to go') || s.includes('midwest')) return 'pkt-local';
      return 'pkt-overview';
    };
    // Split door.dist on common separators into individual distributor chips.
    const distList = (door.dist || '').split(/\s*[·/]\s*/).map(d => d.trim()).filter(Boolean);
    const distChipsHtml = distList.length ? distList.map(d => {
      const slide = distToSlide(d);
      return `<span style="display:inline-block;cursor:pointer;color:#a4b3ff;background:rgba(139,158,255,0.10);border:1px solid rgba(139,158,255,0.35);padding:2px 8px;border-radius:10px;font-family:monospace;font-size:9.5px;letter-spacing:0.4px;margin:1px 2px 1px 0;" onclick="window.goToSlide('${slide}')" onmouseover="this.style.background='rgba(139,158,255,0.22)'" onmouseout="this.style.background='rgba(139,158,255,0.10)'">${d}</span>`;
    }).join('') : `<span style="font-size:10px;color:var(--muted);">—</span>`;
    // Build paired BEFORE | AFTER grid: shelf# | BEFORE band | AFTER band per row.
    // Single CSS grid means each row's height = max(BEFORE, AFTER), so columns always align.
    const shelfCount = Math.max(ds.beforeShelves.length, ds.afterShelves.length);
    const pairedRows = Array.from({ length: shelfCount }, (_, i) => {
      const shelfNum = shelfCount - i;
      const before = ds.beforeShelves[i] || { tiles: [] };
      const after  = ds.afterShelves[i]  || { tiles: [] };
      return `
        <div style="background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;border-radius:3px;font-family:monospace;font-size:14px;font-weight:700;color:rgba(255,255,255,0.85);">${shelfNum}</div>
        ${renderTileBandOnly(before, accent)}
        ${renderTileBandOnly(after, accent)}`;
    }).join('');
    const delta = ds.afterCost - ds.beforeCost;
    const deltaSign = delta >= 0 ? '+' : '−';
    const deltaColor = delta >= 0 ? '#5dcaa5' : '#cc6666';

    // Fixture type label — readable summary of what this fixture IS
    // (cooler door / freezer / endcap / gondola / wall shelf)
    const typeLabel = (() => {
      const t = (door.type || 'cooler').toLowerCase();
      if (t.includes('freezer')) return 'FREEZER DOOR';
      if (t.includes('endcap'))  return 'ENDCAP';
      if (t.includes('gondola')) return 'GONDOLA';
      if (t.includes('shelf'))   return 'WALL SHELF';
      return 'COOLER DOOR';
    })();

    return `
      <div style="margin-bottom:32px;border:2px solid ${accent};border-radius:10px;background:rgba(8,12,18,0.55);overflow:hidden;box-shadow:0 4px 18px rgba(0,0,0,0.35);">
        <!-- Graphical fixture header — strong colored band with fixture number + type at top, like an architectural elevation title block -->
        <div style="display:grid;grid-template-columns:auto 1fr auto;gap:18px;align-items:center;background:linear-gradient(180deg, ${accent}33 0%, ${accent}11 100%);border-bottom:2px solid ${accent};padding:12px 18px;">
          <!-- LEFT: Big fixture tag block (architectural-elevation style) -->
          <div style="display:flex;align-items:center;gap:10px;background:rgba(0,0,0,0.55);border:1.5px solid ${accent};border-radius:6px;padding:6px 14px 6px 12px;">
            <span style="font-family:monospace;font-size:30px;font-weight:800;color:#fff;letter-spacing:2px;line-height:1;">${door.tag}</span>
            <div style="border-left:1px solid rgba(255,255,255,0.25);padding-left:10px;">
              <div style="font-family:monospace;font-size:9px;font-weight:700;color:${accent};letter-spacing:1.6px;line-height:1;">${typeLabel}</div>
              <div style="font-family:monospace;font-size:8.5px;color:var(--muted);letter-spacing:0.8px;margin-top:3px;line-height:1;">${dimsFor(door.tag)}</div>
            </div>
          </div>
          <!-- CENTER: Fixture name + subtitle -->
          <div style="min-width:0;">
            <div style="font-size:16px;color:#fff;font-weight:700;line-height:1.2;letter-spacing:0.3px;">${door.name}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4;">${door.sub || ''}</div>
          </div>
          <!-- RIGHT: Shelves + distributor chips -->
          <div style="text-align:right;font-family:monospace;font-size:10px;color:var(--muted);letter-spacing:1px;flex-shrink:0;max-width:340px;line-height:1.4;">
            <div style="font-size:10.5px;color:#fff;font-weight:600;">${ds.shelfCount} shelves</div>
            <div style="margin-top:5px;display:flex;flex-wrap:wrap;gap:3px;justify-content:flex-end;">${distChipsHtml}</div>
          </div>
        </div>

        <!-- Inner content area, padded inside the frame -->
        <div style="padding:14px 16px;">

        <!-- BEFORE | AFTER paired-grid shelf bands -->
        <!-- 3-col grid: shelf# (34px) · BEFORE band (1fr) · AFTER band (1fr). Each shelf row's height = max(BEFORE, AFTER) so columns ALWAYS align. -->
        <div style="display:grid;grid-template-columns:34px 1fr 1fr;gap:6px 12px;align-items:stretch;margin-bottom:8px;">
          <!-- Header row: shelf# spacer + BEFORE label + AFTER label -->
          <div></div>
          <div style="display:flex;justify-content:space-between;align-items:baseline;padding:0 2px;">
            <span style="font-family:monospace;font-size:10.5px;color:#cc8888;letter-spacing:1.5px;font-weight:700;text-transform:uppercase;">⊟ BEFORE — Existing</span>
            <span style="font-size:10.5px;color:var(--muted);font-family:monospace;">${ds.beforeSkus} SKUs</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:baseline;padding:0 2px;">
            <span style="font-family:monospace;font-size:10.5px;color:#5dcaa5;letter-spacing:1.5px;font-weight:700;text-transform:uppercase;">⊞ AFTER — Repositioned</span>
            <span style="font-size:10.5px;color:var(--muted);font-family:monospace;">${ds.afterSkus} SKUs</span>
          </div>
          ${pairedRows}
        </div>

        <!-- Inventory cost row, full width below -->
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:12px;">
          <div style="background:rgba(140,50,50,0.10);border:1.5px solid rgba(204,102,102,0.4);border-radius:6px;padding:10px 14px;">
            <div style="font-size:9.5px;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;font-weight:600;">BEFORE inventory $</div>
            <div style="font-size:20px;color:#cc8888;font-weight:700;font-family:monospace;margin-top:4px;line-height:1;">${fmtMoney(ds.beforeCost)}</div>
            <div style="font-size:10px;color:var(--muted);margin-top:4px;font-family:monospace;">
              ${ds.removeCount ? `<span style="color:#cc6666;">${ds.removeCount} drop</span>` : 'No drops'}
            </div>
          </div>
          <div style="background:rgba(40,110,80,0.10);border:1.5px solid rgba(93,202,165,0.4);border-radius:6px;padding:10px 14px;">
            <div style="font-size:9.5px;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;font-weight:600;">AFTER inventory $</div>
            <div style="font-size:20px;color:var(--teal);font-weight:700;font-family:monospace;margin-top:4px;line-height:1;">${fmtMoney(ds.afterCost)}</div>
            <div style="font-size:10px;color:var(--muted);margin-top:4px;font-family:monospace;">
              ${ds.newCount ? `<span style="color:#5dcaa5;">${ds.newCount} new</span>` : ''}${ds.newCount && ds.expandCount ? ' · ' : ''}${ds.expandCount ? `<span style="color:#efb045;">${ds.expandCount} expand</span>` : ''}
            </div>
          </div>
          <div style="background:rgba(20,28,42,0.5);border:1.5px solid rgba(255,255,255,0.12);border-radius:6px;padding:10px 14px;">
            <div style="font-size:9.5px;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;font-weight:600;">Delta $ (After − Before)</div>
            <div style="font-size:20px;color:${deltaColor};font-weight:700;font-family:monospace;margin-top:4px;line-height:1;">${deltaSign}${fmtMoney(Math.abs(delta))}</div>
            <div style="font-size:10px;color:var(--muted);margin-top:4px;font-family:monospace;font-style:italic;">
              Wholesale × facings.
            </div>
          </div>
        </div>
        </div><!-- /inner content area -->
      </div>`;
  }).join('');

  const scheduleANoteHtml = scheduleANote ? `
    <div class="card" style="border-left:3px solid #cc6666;padding:10px 14px;margin-top:12px;font-size:11.5px;">
      <strong style="color:#cc6666;">Schedule A drops on this wall:</strong>
      <span style="color:var(--muted);"> ${scheduleANote} ${wallRemoveCount} SKUs total dropped, ${wallNewCount} new SKUs added.</span>
    </div>` : '';

  return `
    <h2 class="slide-title">${title}</h2>
    <p class="slide-subtitle">${subtitle}</p>

    <div style="max-width:1500px;">

      <div class="card accent" style="padding:12px 18px;margin-bottom:18px;">
        <div style="display:grid;grid-template-columns:1fr 1.1fr 1fr 1.8fr 1.4fr;gap:14px;">
          <div><div style="font-size:10.5px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;">WALL</div><div style="font-size:14px;font-weight:600;color:#fff;margin-top:3px;">${wallLabel}</div></div>
          <div><div style="font-size:10.5px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;">DOOR DIMS</div><div style="font-size:14px;font-weight:600;color:#fff;margin-top:3px;">${defaultDimStr}</div></div>
          <div><div style="font-size:10.5px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;">DOORS · SKUs</div><div style="font-size:14px;font-weight:600;color:#fff;margin-top:3px;">${doors.length} doors · ${wallTotalSkus} SKUs</div></div>
          <div><div style="font-size:10.5px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;">DISTRIBUTORS</div><div style="font-size:12.5px;font-weight:600;color:var(--accent);margin-top:3px;line-height:1.4;">${distributorsLine}</div></div>
          <div style="border-left:2px solid var(--teal);padding-left:14px;"><div style="font-size:10.5px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;">WALL INVENTORY $ — BEFORE → AFTER</div><div style="font-size:14px;font-weight:600;margin-top:3px;font-family:monospace;line-height:1.35;"><span style="color:#cc8888;">${fmtMoney(wallBeforeCost)}</span> <span style="color:var(--muted);">→</span> <span style="color:var(--teal);font-weight:700;">${fmtMoney(wallAfterCost)}</span></div></div>
        </div>
      </div>

      <div style="display:flex;gap:14px;margin-bottom:14px;font-size:11px;flex-wrap:wrap;color:var(--muted);">
        <div style="display:flex;align-items:center;gap:6px;"><div style="width:12px;height:12px;background:rgba(60,90,145,0.85);border:1px solid #4d7ec2;border-radius:2px;"></div>KEEP / curate</div>
        <div style="display:flex;align-items:center;gap:6px;"><div style="width:12px;height:12px;background:rgba(40,110,80,0.85);border:1px solid #5dcaa5;border-radius:2px;"></div>NEW</div>
        <div style="display:flex;align-items:center;gap:6px;"><div style="width:12px;height:12px;background:rgba(140,105,40,0.85);border:1px solid #efb045;border-radius:2px;"></div>EXPAND</div>
        <div style="display:flex;align-items:center;gap:6px;"><div style="width:12px;height:12px;background:rgba(140,50,50,0.85);border:1px solid #cc6666;border-radius:2px;"></div>REMOVE — Schedule A</div>
        <div style="margin-left:auto;color:var(--muted);">SH 5 = top shelf · SH 1 = kick-plate</div>
      </div>

      ${doorBlocks}
      ${scheduleANoteHtml}

      <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;">
        <span onclick="window.goToSlide('floorplan')" style="cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-size:11px;color:#5dcaa5;background:rgba(93,202,165,0.10);border:1px solid rgba(93,202,165,0.35);padding:5px 11px;border-radius:14px;font-family:monospace;letter-spacing:0.5px;">&larr; Back to floor plan</span>
      </div>

    </div>
  `;
}


// ============================================================
// renderOneFreezer(key) — single-freezer slide renderer
// Renders ONE of F1/F2/F3 in full-width detail with FRONT/MIDDLE/BACK
// depth zones. Built to support the "each freezer is its own slide"
// requirement (vs. the legacy combined elev-freezers view).
// ============================================================
function renderOneFreezer(key) {
  const FREEZERS = {
    f1: {
      tag: 'F1',
      mission: 'Quick Grab / High Turn',
      tagline: 'Front-loaded fastest sellers — ice cream novelties + pints + single-serve meals.',
      cost: '$380',
      status: 'NEW',
      distributor: 'KEHE',
      distSlide: 'pkt-kehe',
      accent: '#85B7EB',
      dims: '~5 ft W \u00d7 36" H \u00d7 30" D · horizontal glass-lid island',
      zones: [
        { label: 'FRONT (most visible)', tagline: 'Ice cream novelties + bars',
          blocks: [
            {name:'Magnum', format:'Almond bars 3-pk', cost:'4.50', facings:5, status:'new'},
            {name:'Klondike', format:'Original 6-pk', cost:'5.99', facings:5, status:'keep'},
            {name:'Drumstick', format:'Vanilla 8-pk', cost:'6.99', facings:4, status:'keep'},
            {name:'Skinny Cow', format:'Sandwich 6-pk', cost:'5.49', facings:3, status:'new'},
            {name:'Outshine', format:'Fruit bars 6-pk', cost:'4.99', facings:3, status:'new'},
            {name:'Hai Chi', format:'Mochi ice cream', cost:'5.99', facings:3, status:'new'},
          ]},
        { label: 'MIDDLE', tagline: 'Ice cream pints (block by brand)',
          blocks: [
            {name:'Ben & Jerry\u2019s', format:'Half Baked pint', cost:'5.49', facings:6, status:'keep'},

                <button data-ranker="${rankerId}" data-mode="volume" onclick="rankerToggle(this)"

            <div id="${rankerId}" style="background:rgba(0,0,0,0.25);border-radius:4px;padding:6px 4px;max-height:340px;overflow-y:auto;border:1px solid rgba(255,255,255,0.06);">

        return `
          <div class="card" style="border-left:3px solid ${pColor};padding:14px 16px;display:flex;flex-direction:column;gap:10px;">

            <div onclick="window.goToSlide('${d.pktSlide}')" style="cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;padding-bottom:8px;border-bottom:1px solid var(--border);">

                  <span style="font-size:9.5px;background:rgba(255,255,255,0.06);color:var(--muted);padding:1px 6px;border-radius:8px;font-family:monospace;letter-spacing:0.5px;">${priorityLabel[d.priority]}</span>
                  <span style="font-size:10px;color:var(--accent);margin-left:auto;font-family:monospace;letter-spacing:0.5px;">PACKET \u2192</span>
                </div>
                <h3 style="font-size:14px;margin:3px 0 1px 0;color:#fff;">${d.meta.name || d.key}</h3>

                <div style="font-family:monospace;font-size:18px;font-weight:600;color:#fff;line-height:1;">${fmt(d.totalDollars)}</div>
                <div style="font-size:9.5px;color:var(--muted);font-family:monospace;letter-spacing:0.5px;margin-top:3px;">${d.skuCount} SKU${d.skuCount===1?'':'s'}</div>

            <!-- Status mix bar -->
            ${d.skuCount > 0 ? `
            <div>
              <div style="display:flex;height:6px;border-radius:3px;overflow:hidden;background:rgba(255,255,255,0.05);">
                ${newPct > 0 ? `<div style="width:${newPct}%;background:#5dcaa5;" title="${d.newCount} NEW"></div>` : ''}
                ${expandPct > 0 ? `<div style="width:${expandPct}%;background:#efb045;" title="${d.expandCount} EXPAND"></div>` : ''}
                ${currentPct > 0 ? `<div style="width:${currentPct}%;background:#85B7EB;" title="${d.currentCount} CURRENT"></div>` : ''}
              </div>
              <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:4px;font-family:monospace;letter-spacing:0.5px;">
                ${d.newCount > 0 ? `<span style="color:#5dcaa5;">\u25cf ${d.newCount} NEW</span>` : '<span></span>'}
                ${d.expandCount > 0 ? `<span style="color:#efb045;">\u25cf ${d.expandCount} EXPAND</span>` : '<span></span>'}

            <!-- Clickable zones -->
            <div>
              <div style="font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;font-weight:600;">Where this distributor lives in the store \u00b7 click to jump</div>
              <div style="display:flex;flex-wrap:wrap;gap:5px;">${zoneChips || '<span style="font-size:10.5px;color:var(--muted);font-style:italic;">No SKUs in current database</span>'}</div>

            <!-- SKU Ranker (3-mode toggle) -->

              <span>${d.meta.terms || 'Net-15 (IL Liquor Control Act)'}</span>

        `;
      }).join('')}
    </div>

    <div class="card" style="margin-top:18px;border-left:3px solid var(--teal);padding:14px 18px;">
      <h3 style="margin-bottom:10px;">Distributor inventory totals</h3>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">
        <div style="background:rgba(133,183,235,0.08);border-radius:4px;padding:10px 12px;">
          <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;">KEEP \u2014 Existing</div>
          <div style="font-size:20px;font-weight:600;">$29,747</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px;">Transfers with business at close</div>
        </div>
        <div style="background:rgba(93,202,165,0.10);border-radius:4px;padding:10px 12px;">
          <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;">NEW + EXPAND</div>
          <div style="font-size:20px;font-weight:600;color:var(--teal);">$23,436</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px;">First fill-in across 9 distributors</div>
        </div>
        <div style="background:rgba(239,176,69,0.10);border-radius:4px;padding:10px 12px;">
          <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;">GRAND TOTAL</div>
          <div style="font-size:20px;font-weight:600;color:#efb045;">$53,183</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px;">Total inventory after Week 1</div>
        </div>
      </div>
    </div>

    <div class="card accent" style="margin-top:14px;">
      <h3>Phasing strategy \u2014 costs by week</h3>
      <table style="margin-top:10px;">
        <thead>
          <tr><th>Phase</th><th>Timing</th><th>Distributors</th><th style="text-align:right;">Spend</th></tr>
        </thead>
        <tbody>
          <tr><td><strong>Week 1</strong></td><td>Day 1-7</td><td>CBS \u00b7 Southern Glazer\u2019s \u00b7 Eby-Brown</td><td class="num">$9,576</td></tr>
          <tr><td><strong>Week 2</strong></td><td>Day 8-14</td><td>Breakthru \u00b7 Reyes/Coke \u00b7 Pepsi</td><td class="num">$10,177</td></tr>
          <tr><td><strong>Week 3-4</strong></td><td>Day 15-30</td><td>Lakeshore \u00b7 Red Bull \u00b7 KeHE/UNFI</td><td class="num">$2,888</td></tr>
          <tr><td><strong>Month 2</strong></td><td>Day 30-60</td><td>THC Direct \u00b7 Reorders</td><td class="num">$796</td></tr>
          <tr style="background:rgba(93,202,165,0.10);"><td colspan="3"><strong>TOTAL NEW INVENTORY ORDER</strong></td><td class="num"><strong>$23,437</strong></td></tr>
        </tbody>
      </table>
      <p style="margin-top:12px;font-size:13px;">Week 1 priority is alcohol distributors (CBS, Breakthru, Southern Glazer\u2019s) on Net-15 + Eby-Brown on COD for tobacco/vape. Week 2 layers in Reyes/Coke beer plus KeHE/UNFI specialty food for the bodega categories. Weeks 3-4 add THC direct as shelf space opens. The IL 15-day statutory credit means $22,758 of alcohol is delivered Day 1 and not invoiced until Day 15 \u2014 Week 1-2 sales ($35-55K peak season) more than cover it.</p>

  },


  // ============================================================
  // MASTER FIXTURE SHEET — single-page index of all fixtures by group
  // Tabs: EXISTING / REPOSITIONED. Click any fixture to open its slide.
  // Cards are color-coded by primary distributor (legend at top).
  // ============================================================
  'master-sheet': () => {
    const fmtMoney = n => '$' + Math.round(n).toLocaleString();
    // Distributor color map — muted dashboard palette with two tones per dist:
    //   fill   = shelf bars / legend chips (more saturated, body color)
    //   accent = card header + border (darker, white-text-readable)
    const DIST_COLORS = [
      { key:'COKE',     label:'Coke DSD',           fill:'#D94E59', accent:'#9F2E3A' }, // muted crimson
      { key:'PEPSI',    label:'Pepsi DSD',          fill:'#3E8CC6', accent:'#1F5A8E' }, // steel blue
      { key:'REYES',    label:'Reyes',              fill:'#BA6375', accent:'#7B2E42' }, // wine rose
      { key:'LAKESHORE',label:'Lakeshore',          fill:'#3E946B', accent:'#246B4E' }, // deep sage green
      { key:'SOUTHERN', label:"Southern Glazer's",  fill:'#D77A67', accent:'#A95649' }, // soft copper
      { key:'RED BULL', label:'Red Bull DSD',       fill:'#6375D8', accent:'#354A9C' }, // indigo blue
      { key:'BREAKTHRU',label:'Breakthru Beverage', fill:'#A66AB3', accent:'#7A4B8C' }, // amethyst
      { key:'THC',      label:'THC Direct',         fill:'#C65C9A', accent:'#73335E' }, // muted magenta
      { key:'KEHE',     label:'KeHE / UNFI',        fill:'#58BFA9', accent:'#1F6D61' }, // seafoam teal
      { key:'EBY',      label:'Eby-Brown',          fill:'#C7833F', accent:'#965A2D' }, // burnt amber
      { key:'CBS',      label:'CBS',                fill:'#D8AD45', accent:'#8A651F' }, // muted gold
      { key:'DIRECT',   label:'Direct / Producer',  fill:'#7D9BBC', accent:'#526E8C' }, // slate blue
    ];
    const FALLBACK = { fill:'#7D9BBC', accent:'#526E8C' };
    const distColor = (dist) => {
      const d = (dist || '').toUpperCase();
      for (const dc of DIST_COLORS) if (d.includes(dc.key)) return dc.accent;
      return FALLBACK.accent;
    };
    const distPair = (dist) => {
      const d = (dist || '').toUpperCase();
      for (const dc of DIST_COLORS) if (d.includes(dc.key)) return { fill: dc.fill, accent: dc.accent };
      return FALLBACK;
    };
    const hexToRgb = (hex) => {
      const h = hex.replace('#','');
      return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
    };
    const rgbaStr = (hex, a) => { const [r,g,b] = hexToRgb(hex); return `rgba(${r},${g},${b},${a})`; };

    const shelvesCostFor = (shelves, beforeOnly) => {
      const tiles = (shelves || []).flatMap(s => s.tiles || []);
      const filtered = beforeOnly
        ? tiles.filter(t => t.status !== 'new')
        : tiles.filter(t => t.status !== 'remove');
      return filtered.reduce((sum, t) => {
        const f = (t.facings || 1), s = (t.stacked || 1);
        const d = t.depth || (typeof inferDepth === 'function' ? inferDepth(t.format) : 1);
        return sum + (parseFloat(t.cost) || 0) * f * s * d;
      }, 0);
    };

    // Mini-planogram shelf bands — generated from actual shelves data when available.
    // Each shelf renders as a thin colored row with brand-color mini-blocks per SKU.
    const renderMiniShelves = (shelves, mode) => {
      if (!shelves || shelves.length === 0) {
        return `<div style="height:60px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted);font-style:italic;background:rgba(0,0,0,0.2);border-radius:3px;">No shelf data</div>`;
      }
      const visible = shelves.map(s => {
        const tiles = (s.tiles || []).filter(t => mode === 'before' ? t.status !== 'new' : t.status !== 'remove');
        return { tier: s.tier, tiles };
      });
      const N = visible.length;
      return visible.map((s, i) => {
        const shelfNum = N - i;
        if (s.tiles.length === 0) {
          return `<div style="display:grid;grid-template-columns:22px 1fr;gap:2px;margin-bottom:1px;">
            <div style="background:rgba(0,0,0,0.5);font-family:monospace;font-size:8.5px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;border-radius:2px;">${shelfNum}</div>
            <div style="background:rgba(0,0,0,0.18);border:1px dashed rgba(255,255,255,0.10);border-radius:2px;height:12px;"></div>
          </div>`;
        }
        const totalFacings = s.tiles.reduce((sum, t) => sum + (t.facings || 1), 0);
        const tileBlocks = s.tiles.map(t => {
          const facings = t.facings || 1;
          const widthPct = (facings / totalFacings * 100).toFixed(2);
          const removeStyle = t.status === 'remove'
            ? 'opacity:0.72;background-image:repeating-linear-gradient(45deg,rgba(11,17,23,0.55) 0 2px,transparent 2px 6px);'
            : '';
          // Use distributor fill color when known (so the master-sheet shelf bars match the legend chips).
          // For colored tiles by status (no brand match), use new/expand/remove tone from the muted palette.
          const brand = (t.status === 'remove' || t.status === 'empty') ? null : (typeof brandColor === 'function' ? brandColor(t.name) : null);
          const bg = brand ? brand.bg : (t.status === 'new' ? '#58BFA9' : t.status === 'expand' ? '#D8AD45' : t.status === 'remove' ? '#7F8B99' : '#3E8CC6');
          return `<div title="${(t.name || '').replace(/"/g,'&quot;')}" style="flex:0 1 ${widthPct}%;min-width:3px;background-color:${bg};${removeStyle}border-right:1px solid rgba(0,0,0,0.3);"></div>`;
        }).join('');
        return `<div style="display:grid;grid-template-columns:22px 1fr;gap:2px;margin-bottom:1px;">
          <div style="background:rgba(0,0,0,0.5);font-family:monospace;font-size:8.5px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;border-radius:2px;">${shelfNum}</div>
          <div style="display:flex;flex-wrap:nowrap;height:12px;background:rgba(0,0,0,0.4);border-radius:2px;overflow:hidden;">${tileBlocks}</div>
        </div>`;
      }).join('');
    };

    // Shared card builder — muted dashboard style. Header uses accent (dark) for white-on-dark legibility.
    const buildCard = (tag, name, dist, slideId, sku, cost, removeCount, newCount, mode, miniShelvesHtml) => {
      const { fill, accent } = distPair(dist);
      const flags = mode === 'before' && removeCount
        ? `<span style="font-size:9.5px;color:#F4F7FB;background:#526E8C;padding:1px 5px;border-radius:2px;margin-left:6px;font-weight:700;letter-spacing:0.4px;">${removeCount} DROP</span>`
        : (mode === 'after' && newCount ? `<span style="font-size:9.5px;color:#0F141B;background:#58BFA9;padding:1px 5px;border-radius:2px;margin-left:6px;font-weight:700;letter-spacing:0.4px;">${newCount} NEW</span>` : '');
      return `
        <div onclick="window.goToSlide('${slideId}')" style="cursor:pointer;background:#0F141B;border:1.5px solid ${accent};border-radius:8px;overflow:hidden;transition:all 0.15s;display:flex;flex-direction:column;min-height:200px;" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 6px 18px ${rgbaStr(accent,0.45)}';" onmouseout="this.style.transform='translateY(0)';this.style.boxShadow='none';">
          <!-- Header band — accent (dark, white text) -->
          <div style="background:${accent};color:#F4F7FB;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px;border-bottom:2px solid #263241;">
            <strong style="font-family:monospace;font-size:22px;letter-spacing:0.8px;color:#F4F7FB;">${tag}</strong>
            <div style="text-align:right;flex:1;min-width:0;">
              <div style="font-size:11.5px;font-weight:700;line-height:1.2;text-transform:uppercase;letter-spacing:0.6px;color:#F4F7FB;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${name}</div>
              <div style="font-size:9px;font-weight:600;letter-spacing:0.5px;opacity:0.85;text-transform:uppercase;margin-top:2px;font-family:monospace;color:#F4F7FB;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${(dist || '').slice(0,28)}</div>
            </div>
          </div>
          <!-- Mini planogram body — panel bg -->
          <div style="padding:10px 12px;flex:1;display:flex;flex-direction:column;gap:0;background:#111821;">
            ${miniShelvesHtml}
          </div>
          <!-- Footer: SKU count + $$ -->
          <div style="background:#0B1117;padding:8px 14px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid #263241;">
            <span style="font-size:11px;color:#AAB4C0;font-family:monospace;letter-spacing:0.4px;">${sku} SKUs${flags}</span>
            <strong style="font-size:15px;color:${mode === 'before' ? '#AAB4C0' : '#58BFA9'};font-family:monospace;letter-spacing:0.5px;">${fmtMoney(cost)}</strong>
          </div>
        </div>`;
    };

    const doorCard = (tag, mode) => {
      const cfg = DOOR_REGISTRY.configs[tag];
      const shelves = DOOR_REGISTRY.shelves[tag] || [];
      const cost = shelvesCostFor(shelves, mode === 'before');
      const tilesAll = shelves.flatMap(s => s.tiles || []);
      const tilesShown = mode === 'before'
        ? tilesAll.filter(t => t.status !== 'new')
        : tilesAll.filter(t => t.status !== 'remove');
      const removeCount = tilesAll.filter(t => t.status === 'remove').length;
      const newCount = tilesAll.filter(t => t.status === 'new').length;
      const slideId = `door-${tag.toLowerCase()}`;
      const miniShelves = renderMiniShelves(shelves, mode);
      return buildCard(tag, cfg ? cfg.name : tag, cfg ? cfg.dist : '', slideId, tilesShown.length, cost, removeCount, newCount, mode, miniShelves);
    };
    // For non-door fixtures we don't have shelves cached in DOOR_REGISTRY, so render
    // a placeholder block with the SKU count.
    const staticMiniBlock = (sku, dc) => `
      <div style="height:100%;min-height:100px;display:flex;align-items:center;justify-content:center;background:${rgbaStr(dc,0.15)};border:1px dashed ${rgbaStr(dc,0.5)};border-radius:4px;">
        <span style="font-family:monospace;font-size:10px;color:rgba(255,255,255,0.7);letter-spacing:1px;text-transform:uppercase;">${sku} SKUs · open for full layout</span>
      </div>`;
    const staticCard = (tag, name, dist, slideId, costBefore, costAfter, skuBefore, skuAfter, mode) => {
      const cost = mode === 'before' ? costBefore : costAfter;
      const sku = mode === 'before' ? skuBefore : skuAfter;
      const dc = distColor(dist);
      return buildCard(tag, name, dist, slideId, sku, cost, 0, 0, mode, staticMiniBlock(sku, dc));
    };

    // Legend block — fill + accent two-tone chip per distributor
    const legendBlock = `
      <div style="margin-bottom:18px;padding:12px 14px;background:#111821;border:1px solid #263241;border-radius:6px;">
        <div style="font-size:10.5px;color:#AAB4C0;letter-spacing:1.2px;text-transform:uppercase;font-weight:600;margin-bottom:10px;">Distributor color key — fill (shelf bars) · accent (header)</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px 14px;">
          ${DIST_COLORS.map(dc => `
            <div style="display:flex;align-items:center;gap:7px;font-size:11px;color:#F4F7FB;">
              <span style="display:inline-flex;border-radius:3px;overflow:hidden;border:1px solid #263241;">
                <span style="display:inline-block;width:14px;height:14px;background:${dc.fill};"></span>
                <span style="display:inline-block;width:14px;height:14px;background:${dc.accent};"></span>
              </span>
              <span style="font-family:monospace;letter-spacing:0.3px;">${dc.label}</span>
            </div>`).join('')}
        </div>
      </div>`;
    const groupBlock = (heading, sub, cards) => `
      <div style="margin-bottom:24px;">
        <div style="display:flex;justify-content:space-between;align-items:baseline;border-bottom:1.5px solid rgba(255,255,255,0.12);padding-bottom:6px;margin-bottom:10px;">
          <strong style="font-size:13px;color:#fff;letter-spacing:0.6px;text-transform:uppercase;">${heading}</strong>
          <span style="font-size:10.5px;color:var(--muted);font-family:monospace;">${sub}</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;">${cards}</div>
      </div>`;
    const renderForMode = (mode) => {
      const lowerLeft  = ['D1','D2','D3','D4','D5','D6'].map(t => doorCard(t, mode)).join('');
      const topWall    = ['D7','D8','D9','D10'].map(t => doorCard(t, mode)).join('');
      const upperLeft  = ['D11','D12'].map(t => doorCard(t, mode)).join('');
      const topRight   = ['D13','D14','D15','D16','D17','D18'].map(t => doorCard(t, mode)).join('');
      const rightCounter = ['D19','D20'].map(t => doorCard(t, mode)).join('');
      const dsdImpulse = ['D21','D22'].map(t => doorCard(t, mode)).join('');

    const totalBef = cats.reduce((s,c) => s + c.bef$, 0);

    // PIE CHART RENDERER

    // SVG donut with leader-line callouts to outside labels
    // viewBox 480 × 360, donut centered at 240,180, radius 100, hole 36
    const renderPie = (data, valKey, title, total) => {
      const VBW = 480, VBH = 360;
      const cx = 240, cy = 180, r = 100, holeR = 36;
      const elbowR = r + 14;        // diagonal leader segment ends here
      const labelLeftX = 14;        // x for left-side label text
      const labelRightX = VBW - 14; // x for right-side label text
      const horizontalPadding = 6;  // gap between elbow and label text

      // First pass — collect slice angles, paths
      let cumAngle = -Math.PI / 2;
      const visible = data.filter(d => d[valKey] > 0);
      const sliceData = visible.map(d => {
        const v = d[valKey];
        const angle = (v / 100) * 2 * Math.PI;
        const startAngle = cumAngle;
        const endAngle = cumAngle + angle;
        const midAngle = (startAngle + endAngle) / 2;
        cumAngle = endAngle;
        return { d, v, startAngle, endAngle, midAngle, angle };
      });

      // Build slice paths
      const slices = sliceData.map(s => {
        const x1 = cx + r * Math.cos(s.startAngle);
        const y1 = cy + r * Math.sin(s.startAngle);
        const x2 = cx + r * Math.cos(s.endAngle);
        const y2 = cy + r * Math.sin(s.endAngle);
        const largeArc = s.angle > Math.PI ? 1 : 0;
        const path = `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z`;
        return `<path d="${path}" fill="${s.d.color}" stroke="#1a1a1a" stroke-width="1.5" opacity="0.95"/>`;
      });

      // Build leader-line callouts. Stagger label Y to avoid overlap.
      // Bucket by side; sort by Y (sin value); equalize spacing.
      const left = sliceData.filter(s => Math.cos(s.midAngle) < 0).sort((a,b) => Math.sin(a.midAngle) - Math.sin(b.midAngle));
      const right = sliceData.filter(s => Math.cos(s.midAngle) >= 0).sort((a,b) => Math.sin(a.midAngle) - Math.sin(b.midAngle));

      const buildSide = (arr, isRight) => {
        if (!arr.length) return '';
        const labelStep = 26;
        const sideHeight = arr.length * labelStep;
        const topY = cy - sideHeight / 2 + labelStep / 2;
        return arr.map((s, i) => {
          // Slice edge point
          const ex = cx + r * Math.cos(s.midAngle);
          const ey = cy + r * Math.sin(s.midAngle);
          // Elbow point — diagonal segment
          const elx = cx + elbowR * Math.cos(s.midAngle);
          // Vertically equalized label Y
          const labelY = topY + i * labelStep;
          // Horizontal segment endpoint x — pulls all elbows toward outside column
          const horizX = isRight ? labelRightX - 80 : labelLeftX + 80;
          // Label text x
          const labelX = isRight ? labelRightX : labelLeftX;
          const anchor = isRight ? 'end' : 'start';
          // Polyline: slice → elbow (with elbowR diagonal) → labelY at horizX → label
          // Actually simpler: slice edge → (horizX, labelY) → (labelX, labelY)
          const points = `${ex.toFixed(1)},${ey.toFixed(1)} ${horizX},${labelY} ${(labelX + (isRight ? -horizontalPadding : horizontalPadding)).toFixed(1)},${labelY}`;
          return `
            <polyline points="${points}" fill="none" stroke="${s.d.color}" stroke-width="1.2" opacity="0.65"/>
            <circle cx="${ex.toFixed(1)}" cy="${ey.toFixed(1)}" r="2.2" fill="${s.d.color}"/>
            <text x="${labelX}" y="${labelY - 1}" text-anchor="${anchor}" fill="#fff" style="font-size:10.5px;font-weight:600;pointer-events:none;">${s.d.n}</text>
            <text x="${labelX}" y="${labelY + 11}" text-anchor="${anchor}" fill="${s.d.color}" style="font-size:10px;font-weight:600;font-family:monospace;pointer-events:none;">${s.v.toFixed(1)}%</text>`;
        }).join('');
      };

      return `
        <div style="text-align:center;">
          <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:4px;">${title}</div>
          <div style="font-size:11px;color:var(--muted);font-family:monospace;margin-bottom:8px;">$${total.toLocaleString()} total</div>
          <svg viewBox="0 0 ${VBW} ${VBH}" style="width:100%;max-width:520px;">
            ${slices.join('')}
            <circle cx="${cx}" cy="${cy}" r="${holeR}" fill="#0d1117" stroke="rgba(255,255,255,0.1)"/>
            <text x="${cx}" y="${cy - 4}" text-anchor="middle" fill="#888" style="font-size:9px;letter-spacing:1px;">INVENTORY</text>
            <text x="${cx}" y="${cy + 11}" text-anchor="middle" fill="#fff" style="font-size:13px;font-weight:700;">$${(total/1000).toFixed(1)}k</text>
            ${buildSide(left, false)}
            ${buildSide(right, true)}

                const sty = statusColors[b.status || 'keep'];
                const widthPct = (((b.facings || 1) / totalFacings) * 100).toFixed(2);
                const dashStyle = sty.dashed ? 'border-style:dashed;' : '';
                return `
                  <div style="flex:0 1 ${widthPct}%;min-width:0;background:${sty.bg};border:1.5px solid ${sty.border};${dashStyle}border-radius:2px;padding:5px 7px;overflow:hidden;color:${sty.text};">
